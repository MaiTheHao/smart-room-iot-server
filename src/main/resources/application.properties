# ===================================================================
# 1. SYSTEM & GLOBAL CONFIGURATION (JVM, Timezones, Serialization, Logging)
# ===================================================================

spring.threads.virtual.enabled=true

# --- TIMEZONE CONFIGURATION ---
spring.jvm.timezone=UTC
spring.jackson.time-zone=UTC
hibernate.jdbc.time_zone=UTC

# --- SERIALIZATION (JACKSON) ---
spring.jackson.deserialization.fail-on-unknown-properties=false

# ===================================================================
# 2. DATABASE & ORM CONFIGURATION (JDBC, JNDI, Hibernate, Batching)
# ===================================================================

app.jdbc.jndi-name=java:comp/env/jdbc/smartroom_db

# --- JDBC CONNECTION (Local Dev Fallback) ---
app.jdbc.driverClassName=org.mariadb.jdbc.Driver
app.jdbc.url=jdbc:mariadb://localhost:3306/smart_room_iot?useSSL=false&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=UTC
app.jdbc.username=root
app.jdbc.password=root

# --- HIBERNATE / JPA PROPERTIES ---
app.hibernate.hbm2ddl.auto=update
app.hibernate.show_sql=false
app.hibernate.format_sql=true
app.hibernate.generate_statictics=false

# --- BATCHING OPTIMIZATION ---
app.hibernate.jdbc.batch_size=50
app.hibernate.order_inserts=true
app.hibernate.order_updates=true

# ===================================================================
# 3. SECURITY & CORS CONFIGURATION
# ===================================================================

# --- APP CUSTOM PROPERTIES ---
app.jwt.secret=iVietSecretKey
app.jwt.expirationMs=172800000
startup.permissionCache.enabled=true
app.rate-limit.enabled=true
app.rate-limit.cache.expire-minutes=10
app.rate-limit.cache.max-size=10000
app.rate-limit.high-frequency.capacity=150
app.rate-limit.high-frequency.refill-period-ms=1500
app.rate-limit.normal.capacity=100
app.rate-limit.normal.refill-period-ms=1500

# --- CORS ---
app.cors.allowedOrigins=http://localhost:3000,http://localhost:8080
app.cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowedHeaders=*
app.cors.allowCredentials=true
app.cors.maxAge=3600

# ===================================================================
# 4. ENGINES & JOBS CONFIGURATION (Telemetry, Rule, Metrics)
# ===================================================================

# --- RULE ENGINE ---
app.engine.rule.computeEpsilon=0.05
app.engine.rule.scanIntervalSeconds=300
app.engine.rule.telemetryLookbackMinutes=600

# --- TELEMETRY ENGINE ---
app.engine.telemetry.scanIntervalSeconds=300
app.engine.telemetry.roomStatusLookbackSeconds=600

# --- ENERGY METRIC ENGINE ---
app.engine.metric_energy.telemetry.intervalSeconds=300
app.engine.metric_energy.reset.cron=0 0 0 * * ?

# --- DEVICE STATUS METRIC JOB ---
app.engine.metric_status.intervalSeconds=300

# ===================================================================
# 5. EXTERNAL SERVICES / GATEWAY CONFIGURATION
# ===================================================================

# --- GATEWAY CLIENT CONFIG ---
app.gateway.scheme=http
app.gateway.port=8080
app.gateway.base-path=smrsiot/api

# ===================================================================
# 6. HTTP CLIENT CONFIGURATIONS
# ===================================================================

# =====================================================================
# --- Default Client ---
# =====================================================================
app.httpclient.default.default.connect-timeout-ms            = 3000
app.httpclient.default.default.connection-request-timeout-ms = 3000
app.httpclient.default.default.response-timeout-ms           = 5000
app.httpclient.default.default.max-conn-total                = 300
app.httpclient.default.default.max-conn-per-route           = 100

# =====================================================================
# --- Gateway Control Client ---
# =====================================================================
app.httpclient.gateway.control.connect-timeout-ms            = 1500
app.httpclient.gateway.control.connection-request-timeout-ms = 2000
app.httpclient.gateway.control.response-timeout-ms           = 3000
app.httpclient.gateway.control.max-conn-total                = 500
app.httpclient.gateway.control.max-conn-per-route           = 500

# =====================================================================
# --- Gateway Telemetry Client ---
# =====================================================================
app.httpclient.gateway.telemetry.connect-timeout-ms            = 5000
app.httpclient.gateway.telemetry.connection-request-timeout-ms = 3000
app.httpclient.gateway.telemetry.response-timeout-ms           = 5000
app.httpclient.gateway.telemetry.max-conn-total                = 200
app.httpclient.gateway.telemetry.max-conn-per-route           = 100

# =====================================================================
# --- Gateway Legacy Client ---
# =====================================================================
app.httpclient.gateway.legacy.connect-timeout-ms            = 4000
app.httpclient.gateway.legacy.connection-request-timeout-ms = 3000
app.httpclient.gateway.legacy.response-timeout-ms           = 5000
app.httpclient.gateway.legacy.max-conn-total                = 30
app.httpclient.gateway.legacy.max-conn-per-route           = 15

# ===================================================================
# 7. FIREBASE CONFIGURATION
# ===================================================================
app.firebase.service-account-key-path=/opt/smrc/firebase/serviceAccountKey.json