# ===================================================================
# 1. SYSTEM & GLOBAL CONFIGURATION (JVM, Timezones, Serialization, Logging)
# ===================================================================

# --- TIMEZONE CONFIGURATION ---
spring.jvm.timezone=UTC
spring.jackson.time-zone=UTC
hibernate.jdbc.time_zone=UTC

# --- SERIALIZATION (JACKSON) ---
spring.jackson.deserialization.fail-on-unknown-properties=false

# ===================================================================
# 2. DATABASE & ORM CONFIGURATION (JDBC, JNDI, Hibernate, Batching)
# ===================================================================

# --- JNDI CONFIG (Production via Tomcat) ---
jdbc.jndi-name=java:comp/env/jdbc/smartroom_db

# --- JDBC CONNECTION (Local Dev Fallback) ---
# Dùng khi chạy local hoặc khi JNDI không khả dụng
jdbc.driverClassName=org.mariadb.jdbc.Driver
jdbc.url=jdbc:mariadb://localhost:3306/smart_room_iot?useSSL=false&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=UTC
jdbc.username=root
jdbc.password=root

# --- HIBERNATE / JPA PROPERTIES ---
hibernate.hbm2ddl.auto=update
hibernate.show_sql=false
hibernate.format_sql=true
hibernate.generate_statistics=false

# --- BATCHING OPTIMIZATION ---
hibernate.jdbc.batch_size=50
hibernate.order_inserts=true
hibernate.order_updates=true

# ===================================================================
# 3. SECURITY & CORS CONFIGURATION
# ===================================================================

# --- APP CUSTOM PROPERTIES ---
iviet.app.jwtSecret=iVietSecretKey
iviet.app.jwtExpirationMs=172800000
startup.permissionCache.enabled=true
app.rate-limit.enabled=false

# --- CORS ---
cors.allowedOrigins=http://localhost:3000,http://localhost:8080
cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS
cors.allowedHeaders=*
cors.allowCredentials=true
cors.maxAge=3600

# ===================================================================
# 4. ENGINES & JOBS CONFIGURATION (Telemetry, Rule, Metrics)
# ===================================================================

# --- RULE ENGINE ---
app.engine.rule.computeEpsilon=0.05
# 5 phút = 300 giây
app.engine.rule.scanIntervalSeconds=300
# 10 giờ = 600 phút
app.engine.rule.telemetryLookbackMinutes=600

# --- TELEMETRY ENGINE ---
# 2 phút = 120 giây
app.engine.telemetry.scanIntervalSeconds=120
# 10 phút = 600 giây
app.engine.telemetry.roomStatusLookbackSeconds=600

# --- ENERGY METRIC ENGINE ---
# 5 phút = 300 giây
app.engine.metric_energy.telemetry.intervalSeconds=300
# Daily at 00:00:00 UTC
app.engine.metric_energy.reset.cron=0 0 0 * * ?

# --- DEVICE STATUS METRIC JOB ---
# 5 phút = 300 giây
app.engine.metric_status.intervalSeconds=300

# ===================================================================
# 5. EXTERNAL SERVICES / GATEWAY CONFIGURATION
# ===================================================================

# --- GATEWAY CLIENT CONFIG ---
app.gateway.scheme=http
app.gateway.port=9090
app.gateway.base-path=/api