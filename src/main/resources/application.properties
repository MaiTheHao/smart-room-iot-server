# --- JDBC CONNECTION (Local Dev Fallback) ---
# Dùng khi chạy local hoặc khi JNDI không khả dụng
jdbc.driverClassName=com.mysql.cj.jdbc.Driver
jdbc.url=jdbc:mysql://localhost:3306/smart_room_iot?useSSL=false&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
jdbc.username=root
jdbc.password=206512

# --- JNDI CONFIG (Production via Tomcat) ---
jdbc.jndi-name=java:comp/env/jdbc/smartroom_db

# --- HIBERNATE / JPA PROPERTIES ---
hibernate.hbm2ddl.auto=update
hibernate.show_sql=false
hibernate.format_sql=true
hibernate.generate_statistics=false

# --- BATCHING OPTIMIZATION ---
hibernate.jdbc.batch_size=50
hibernate.order_inserts=true
hibernate.order_updates=true

# --- LOGGING ---
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.stat=INFO

# --- JACKSON CONFIG ---
spring.jackson.deserialization.fail-on-unknown-properties=false

# --- APP CUSTOM PROPERTIES ---
iviet.app.jwtSecret=iVietSecretKey
iviet.app.jwtExpirationMs=172800000
startup.permissionCache.enabled=true

# --- CORS ---
cors.allowedOrigins=http://localhost:3000,http://localhost:8080
cors.allowedMethods=GET,POST,PUT,DELETE,OPTIONS
cors.allowedHeaders=*
cors.allowCredentials=true
cors.maxAge=3600

# --- METADATA ---

# Chọn múi giờ cho ứng dụng, định dạng theo chuẩn] IANA Time Zone Database
app.timezone=Asia/Ho_Chi_Minh

# --- RULE ENGINE ---
app.engine.rule.computeEpsilon=0.05
# 5 phút = 300 giây
app.engine.rule.scanIntervalSeconds=300

# --- RULE ENGINE TELEMETRY LOOKBACK ---
# 10 giờ = 600 phút
app.engine.rule.telemetryLookbackMinutes=600

# --- TELEMETRY ENGINE ---
# 2 phút = 120 giây
app.engine.telemetry.scanIntervalSeconds=120

# --- ENERGY METRIC ENGINE ---
# 5 phút = 300 giây
app.engine.metric_energy.telemetry.intervalSeconds=300
# Daily at 00:00:00 UTC
app.engine.metric_energy.reset.cron=0 0 0 * * ?
