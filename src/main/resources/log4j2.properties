# Basic configuration
status = warn
name = IUHSMRCLoggerConfig

# ==========================================
# 1. CẤU HÌNH CONSOLE
# ==========================================
appender.console.type = Console
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p [%c{1}]:%L - %msg%n
appender.console.filter.threshold.type = ThresholdFilter
appender.console.filter.threshold.level = info

# ==========================================
# 2. CẤU HÌNH FILE
# ==========================================
appender.file.type = RollingFile
appender.file.name = File
appender.file.fileName = ${sys:catalina.base}/logs/application.log
appender.file.filePattern = ${sys:catalina.base}/logs/application-%d{yyyy-MM-dd}-%i.log.gz
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p [%c{1}]:%L - %msg%n
appender.file.policies.type = Policies
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 10MB
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 10 

# File SQL
appender.sql_file.type = RollingFile
appender.sql_file.name = SqlFile
appender.sql_file.fileName = ${sys:catalina.base}/logs/application-sql.log
appender.sql_file.filePattern = ${sys:catalina.base}/logs/application-sql-%d{yyyy-MM-dd}-%i.log.gz
appender.sql_file.layout.type = PatternLayout
appender.sql_file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p [%c{1}]:%L - %msg%n
appender.sql_file.policies.type = Policies
appender.sql_file.policies.size.type = SizeBasedTriggeringPolicy
appender.sql_file.policies.size.size = 10MB
appender.sql_file.strategy.type = DefaultRolloverStrategy
appender.sql_file.strategy.max = 10 

# ==========================================
# 3. ROOT LOGGER
# ==========================================
rootLogger.level = info
rootLogger.appenderRef.Console.ref = Console
rootLogger.appenderRef.File.ref = File

# ==========================================
# 4. APP LOGGER 
# ==========================================
logger.app.name = com.iviet.ivshs
logger.app.level = ${sys:APP_LOG_LEVEL:-info}
logger.app.additivity = false
logger.app.appenderRef.Console.ref = Console
logger.app.appenderRef.File.ref = File

# ==========================================
# 5. HIBERNATE SQL LOGGER
# ==========================================
# Log SQL statements
logger.hibernate_sql.name = org.hibernate.SQL
logger.hibernate_sql.level = ${sys:SQL_LOG_LEVEL:-info}
logger.hibernate_sql.additivity = false
logger.hibernate_sql.appenderRef.Console.ref = Console
logger.hibernate_sql.appenderRef.SqlFile.ref = SqlFile

# Log SQL binding parameters
logger.hibernate_type.name = org.hibernate.orm.jdbc.bind
logger.hibernate_type.level = ${sys:SQL_BIND_LEVEL:-info}
logger.hibernate_type.additivity = false
logger.hibernate_type.appenderRef.Console.ref = Console
logger.hibernate_type.appenderRef.SqlFile.ref = SqlFile

# Log Hibernate Statistics
logger.hibernate_stat.name = org.hibernate.stat
logger.hibernate_stat.level = info
logger.hibernate_stat.additivity = false
logger.hibernate_stat.appenderRef.Console.ref = Console
logger.hibernate_stat.appenderRef.SqlFile.ref = SqlFile