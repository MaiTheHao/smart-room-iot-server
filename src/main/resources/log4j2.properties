# Basic configuration
status = debug
name = SmartRoomLoggerConfig

# ==========================================
# 1. CẤU HÌNH CONSOLE
# ==========================================
appender.console.type = Console
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p [%X{traceId}] [%X{scenarioId}] [%c{1}]:%L - %msg%n
appender.console.filter.threshold.type = ThresholdFilter
appender.console.filter.threshold.level = debug

# ==========================================
# 2. CẤU HÌNH FILE
# ==========================================
appender.file.type = RollingFile
appender.file.name = File
appender.file.fileName = ${sys:catalina.base}/logs/application.log
appender.file.filePattern = ${sys:catalina.base}/logs/application-%d{yyyy-MM-dd}-%i.log.gz
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p [%X{traceId}] [%X{scenarioId}] [%c{1}]:%L - %msg%n
appender.file.policies.type = Policies
appender.file.policies.size.type = SizeBasedTriggeringPolicy
appender.file.policies.size.size = 10MB
appender.file.strategy.type = DefaultRolloverStrategy
appender.file.strategy.max = 10 

# File SQL
appender.sql_file.type = RollingFile
appender.sql_file.name = SqlFile
appender.sql_file.fileName = ${sys:catalina.base}/logs/application-sql.log
appender.sql_file.filePattern = ${sys:catalina.base}/logs/application-sql-%d{yyyy-MM-dd}-%i.log.gz
appender.sql_file.layout.type = PatternLayout
appender.sql_file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5p [%X{traceId}] [%X{scenarioId}] [%c{1}]:%L - %msg%n
appender.sql_file.policies.type = Policies
appender.sql_file.policies.size.type = SizeBasedTriggeringPolicy
appender.sql_file.policies.size.size = 10MB
appender.sql_file.strategy.type = DefaultRolloverStrategy
appender.sql_file.strategy.max = 10 

# File JSON Trace (raw - được wrap bởi Async)
appender.trace_file.type = RollingFile
appender.trace_file.name = TraceFile
appender.trace_file.fileName = ${sys:catalina.base}/logs/application-trace.log
appender.trace_file.filePattern = ${sys:catalina.base}/logs/application-trace-%d{yyyy-MM-dd}-%i.log.gz
appender.trace_file.layout.type = PatternLayout
appender.trace_file.layout.pattern = %msg%n
appender.trace_file.policies.type = Policies
appender.trace_file.policies.size.type = SizeBasedTriggeringPolicy
appender.trace_file.policies.size.size = 10MB
appender.trace_file.strategy.type = DefaultRolloverStrategy
appender.trace_file.strategy.max = 10

# Async wrapper cho TraceFile - không block request thread
appender.async_trace.type = Async
appender.async_trace.name = AsyncTraceFile
appender.async_trace.appenderRef.ref = TraceFile

# ==========================================
# 3. ROOT LOGGER
# ==========================================
rootLogger.level = info
rootLogger.appenderRef.Console.ref = Console
rootLogger.appenderRef.File.ref = File

# ==========================================
# 4. APP LOGGER 
# ==========================================
logger.app.name = com.iviet.ivshs
logger.app.level = ${sys:APP_LOG_LEVEL:-info}
logger.app.additivity = false
logger.app.appenderRef.Console.ref = Console
logger.app.appenderRef.File.ref = File

# ==========================================
# 5. APM LOGGER (RequestLoggingAspect)
# additivity=false: không bắn lên app/root logger
# Console + File: chỉ nhận DEBUG trở lên (verbose như cũ)
# AsyncTraceFile: chỉ nhận đúng TRACE (1 dòng JSON compact từ ObjectMapper)
# ==========================================
logger.apm.name = com.iviet.ivshs.aop.RequestLoggingAspect
logger.apm.level = ${sys:APM_LOG_LEVEL:-trace}
logger.apm.additivity = false

logger.apm.appenderRef.Console.ref = Console
logger.apm.appenderRef.Console.filter.threshold.type = ThresholdFilter
logger.apm.appenderRef.Console.filter.threshold.level = debug

logger.apm.appenderRef.File.ref = File
logger.apm.appenderRef.File.filter.threshold.type = ThresholdFilter
logger.apm.appenderRef.File.filter.threshold.level = debug

logger.apm.appenderRef.AsyncTraceFile.ref = AsyncTraceFile
logger.apm.appenderRef.AsyncTraceFile.filter.range.type = LevelRangeFilter
logger.apm.appenderRef.AsyncTraceFile.filter.range.minLevel = trace
logger.apm.appenderRef.AsyncTraceFile.filter.range.maxLevel = trace

# ==========================================
# 6. HIBERNATE SQL LOGGER
# ==========================================
# Log SQL statements
logger.hibernate_sql.name = org.hibernate.SQL
logger.hibernate_sql.level = ${sys:SQL_LOG_LEVEL:-info}
logger.hibernate_sql.additivity = false
logger.hibernate_sql.appenderRef.Console.ref = Console
logger.hibernate_sql.appenderRef.SqlFile.ref = SqlFile

# Log SQL binding parameters
logger.hibernate_type.name = org.hibernate.orm.jdbc.bind
logger.hibernate_type.level = ${sys:SQL_BIND_LEVEL:-info}
logger.hibernate_type.additivity = false
logger.hibernate_type.appenderRef.Console.ref = Console
logger.hibernate_type.appenderRef.SqlFile.ref = SqlFile

# Log Hibernate Statistics
logger.hibernate_stat.name = org.hibernate.stat
logger.hibernate_stat.level = info
logger.hibernate_stat.additivity = false
logger.hibernate_stat.appenderRef.Console.ref = Console
logger.hibernate_stat.appenderRef.SqlFile.ref = SqlFile

# ==========================================
# 7. HTTP CLIENT LOGGER
# ==========================================
logger.http_client.name = org.apache.hc.client5.http
logger.http_client.level = debug
logger.http_client.additivity = false
logger.http_client.appenderRef.Console.ref = Console
logger.http_client.appenderRef.File.ref = File

logger.http_client_headers.name = org.apache.hc.client5.http.headers
logger.http_client_headers.level = debug
logger.http_client_headers.additivity = false
logger.http_client_headers.appenderRef.Console.ref = Console
logger.http_client_headers.appenderRef.File.ref = File

logger.http_client_wire.name = org.apache.hc.client5.http.wire
logger.http_client_wire.level = debug
logger.http_client_wire.additivity = false
logger.http_client_wire.appenderRef.Console.ref = Console
logger.http_client_wire.appenderRef.File.ref = File