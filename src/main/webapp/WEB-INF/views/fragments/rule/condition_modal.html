<th:block th:fragment="modal_content" xmlns:th="http://www.thymeleaf.org">
  <!-- Condition Create/Edit Modal -->
  <div class="modal fade" id="conditionModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">
            <i class="fas fa-filter mr-2"></i>
            <span id="conditionModalTitleText">Add Condition</span>
          </h5>
          <button type="button" class="close text-white" data-dismiss="modal">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>

        <div class="modal-body bg-light p-0">
          <form id="conditionForm" novalidate>
            <input type="hidden" id="conditionLocalId" />

            <!-- Card 1: Data Source -->
            <div class="card card-outline card-info m-3 mb-2 shadow-sm">
              <div class="card-header py-2">
                <h6 class="card-title m-0 font-weight-bold text-info">
                  <i class="fas fa-database mr-1"></i>
                  <span th:text="#{rule.condition.table.datasource}">Data Source</span>
                </h6>
              </div>
              <div class="card-body">
                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group mb-0">
                      <label class="small font-weight-bold" th:text="#{rule.condition.table.datasource}">Data Source</label>
                      <select class="form-control form-control-sm" id="condDataSourceSelect">
                        <option value="" disabled selected>Select source</option>
                        <option value="SYSTEM">SYSTEM (Time, Day, etc.)</option>
                        <option value="ROOM">ROOM (Status, Occupancy)</option>
                        <option value="DEVICE">DEVICE (Power, Level, etc.)</option>
                        <option value="SENSOR">SENSOR (Temp, Hum, etc.)</option>
                      </select>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group mb-0">
                      <label class="small font-weight-bold" th:text="#{rule.condition.table.next_logic}">Next Logic</label>
                      <select class="form-control form-control-sm" id="condNextLogicSelect">
                        <option value="AND">AND</option>
                        <option value="OR">OR</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Card 2: Resource Selection -->
            <div class="card card-outline card-primary m-3 mt-0 mb-2 shadow-sm">
              <div class="card-header py-2">
                <h6 class="card-title m-0 font-weight-bold text-primary">
                  <i class="fas fa-search-location mr-1"></i>
                  <span th:text="#{rule.condition.table.resource}">Resource Selection</span>
                </h6>
              </div>
              <div class="card-body">
                <!-- SYSTEM selection -->
                <div id="condSectionSystem" style="display: none">
                  <div class="form-group mb-0">
                    <label class="small font-weight-bold">System Property</label>
                    <select class="form-control form-control-sm" id="condSystemProperty">
                      <option value="" disabled selected>Select property</option>
                      <option value="hour">Hour of day (0-23)</option>
                      <option value="day_of_week">Day of week (1=Mon, 7=Sun)</option>
                    </select>
                  </div>
                </div>

                <!-- ROOM selection -->
                <div id="condSectionRoom" style="display: none">
                  <div class="row">
                    <div class="col-md-4">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold">Property</label>
                        <select class="form-control form-control-sm" id="condRoomProperty">
                          <option value="" disabled selected>Select property</option>
                          <option value="occupancy">Occupancy</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold">Floor</label>
                        <select class="form-control form-control-sm" id="condRoomFloorSelect">
                          <option value="" disabled selected>Select floor</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold">Room</label>
                        <select class="form-control form-control-sm" id="condRoomRoomSelect" disabled>
                          <option value="" disabled selected>Select room</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- DEVICE/SENSOR selection -->
                <div id="condSectionDeviceSensor" style="display: none">
                  <div class="row">
                    <div class="col-md-3">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold">Category</label>
                        <select class="form-control form-control-sm" id="condCategorySelect">
                          <option value="" disabled selected>Select category</option>
                          <option value="LIGHT" data-for="DEVICE">LIGHT</option>
                          <option value="FAN" data-for="DEVICE">FAN</option>
                          <option value="AIR_CONDITION" data-for="DEVICE">AIR_CONDITION</option>
                          <option value="TEMPERATURE" data-for="SENSOR">TEMPERATURE</option>
                          <option value="POWER_CONSUMPTION" data-for="SENSOR">POWER_CONSUMPTION</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-3">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold">Floor</label>
                        <select class="form-control form-control-sm" id="condFloorSelect" disabled>
                          <option value="" disabled selected>Select floor</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-3">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold">Room</label>
                        <select class="form-control form-control-sm" id="condRoomSelect" disabled>
                          <option value="" disabled selected>Select room</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-3">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold">Device/Sensor</label>
                        <select class="form-control form-control-sm" id="condDeviceSelect" disabled>
                          <option value="" disabled selected>Select device/sensor</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-12 mt-2">
                      <div class="form-group mb-0">
                        <label class="small font-weight-bold">Property</label>
                        <select class="form-control form-control-sm" id="condPropertySelect" disabled>
                          <option value="" disabled selected>Select property</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Card 3: Operator & Value -->
            <div class="card card-outline card-success m-3 mt-0 mb-3 shadow-sm">
              <div class="card-header py-2">
                <h6 class="card-title m-0 font-weight-bold text-success">
                  <i class="fas fa-equals mr-1"></i>
                  <span>Logic & Value</span>
                </h6>
              </div>
              <div class="card-body">
                <div class="row">
                  <div class="col-md-6">
                    <div class="form-group mb-0">
                      <label class="small font-weight-bold" th:text="#{rule.condition.table.operator}">Operator</label>
                      <select class="form-control form-control-sm" id="condOperatorSelect">
                        <option value="=">=</option>
                        <option value="!=">!=</option>
                        <option value=">">&gt;</option>
                        <option value=">=">&gt;=</option>
                        <option value="<">&lt;</option>
                        <option value="<=">&lt;=</option>
                        <option value="CONTAINS">CONTAINS</option>
                      </select>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-group mb-0">
                      <label class="small font-weight-bold" th:text="#{rule.condition.table.value}">Value</label>
                      <input type="text" class="form-control form-control-sm" id="condValue" placeholder="Comparison value" />
                      <select class="form-control form-control-sm" id="condValueEnum" style="display: none">
                        <option value="" disabled selected>Select value</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">
            <i class="fas fa-times mr-1"></i>
            <span th:text="#{common.btn.cancel}">Cancel</span>
          </button>
          <button type="button" class="btn btn-primary btn-sm" id="btnSaveCondition">
            <i class="fas fa-save mr-1"></i>
            <span th:text="#{rule.modal.rule.btn.save}">Save Condition</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</th:block>
