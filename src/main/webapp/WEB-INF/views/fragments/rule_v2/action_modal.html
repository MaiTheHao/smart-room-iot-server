<th:block th:fragment="modal_content" xmlns:th="http://www.thymeleaf.org">
  <!-- Action Create/Edit Modal -->
  <div class="modal fade" id="actionModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">
            <i class="fas fa-bolt mr-2"></i>
            <span id="actionModalTitleText" th:text="#{rulev2.modal.action.title.add}">Add Action</span>
          </h5>
          <button type="button" class="close text-white" data-dismiss="modal">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>

        <div class="modal-body bg-light p-0">
          <form id="actionForm" novalidate>
            <input type="hidden" id="actionLocalId" />

            <!-- Card 1: Target Device -->
            <div class="card card-outline card-info m-3 mb-2 shadow-sm">
              <div class="card-header py-2">
                <div class="d-flex justify-content-between align-items-center">
                  <h6 class="card-title m-0 font-weight-bold text-info">
                    <i class="fas fa-microchip mr-1"></i>
                    <span th:text="#{rulev2.modal.action.section.target}">Target Device</span>
                  </h6>
                  <div class="form-group mb-0 d-flex align-items-center">
                    <label for="actExecutionOrder" class="small font-weight-bold mr-2 mb-0" th:text="#{rulev2.modal.action.label.order}">Order:</label>
                    <input type="number" class="form-control form-control-sm text-center" id="actExecutionOrder" style="width: 70px;" min="0" value="0" />
                  </div>
                </div>
              </div>
              <div class="card-body">
                <div id="actTargetSelection">
                  <div class="row">
                    <div class="col-md-3">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.category}">Category</label>
                        <select class="form-control form-control-sm" id="actCategorySelect">
                          <option value="" disabled selected th:text="#{rule.modal.category.select}">Select category</option>
                          <option value="LIGHT">LIGHT</option>
                          <option value="FAN">FAN</option>
                          <option value="AIR_CONDITION">AIR_CONDITION</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-3">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.floor}">Floor</label>
                        <select class="form-control form-control-sm" id="actFloorSelect" disabled>
                          <option value="" disabled selected th:text="#{rule.modal.floor.select}">Select floor</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-3">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.room}">Room</label>
                        <select class="form-control form-control-sm" id="actRoomSelect" disabled>
                          <option value="" disabled selected th:text="#{rule.modal.room.select}">Select room</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-3">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.device}">Device</label>
                        <select class="form-control form-control-sm" id="actDeviceSelect" disabled>
                          <option value="" disabled selected th:text="#{rule.modal.device.select}">Select device</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Card 2: Action Parameters -->
            <div class="card card-outline card-warning m-3 mt-0 mb-3 shadow-sm">
              <div class="card-header py-2">
                <h6 class="card-title m-0 font-weight-bold text-warning">
                  <i class="fas fa-sliders-h mr-1"></i>
                  <span th:text="#{rulev2.modal.action.section.params}">Action Parameters</span>
                </h6>
                <small class="text-muted ml-4" th:text="#{rulev2.modal.action.hint.optional}">Leave fields blank to not change device state</small>
              </div>
              <div class="card-body">
                <!-- LIGHT params -->
                <div id="actParamLight" class="act-param-section" style="display: none">
                  <div class="row">
                    <div class="col-md-6">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.power}">Power</label>
                        <select class="form-control form-control-sm" id="actLightPower">
                          <option value="">-- not set --</option>
                          <option value="ON">ON</option>
                          <option value="OFF">OFF</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-6">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.level}">Level (0-100)</label>
                        <input type="number" class="form-control form-control-sm" id="actLightLevel" min="0" max="100" placeholder="-- not set --" />
                      </div>
                    </div>
                  </div>
                </div>

                <!-- FAN params -->
                <div id="actParamFan" class="act-param-section" style="display: none">
                  <div class="row">
                    <div class="col-md-4">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.power}">Power</label>
                        <select class="form-control form-control-sm" id="actFanPower">
                          <option value="">-- not set --</option>
                          <option value="ON">ON</option>
                          <option value="OFF">OFF</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.mode}">Mode</label>
                        <select class="form-control form-control-sm" id="actFanMode">
                          <option value="">-- not set --</option>
                          <option value="NORMAL">NORMAL</option>
                          <option value="SLEEP">SLEEP</option>
                          <option value="NATURAL">NATURAL</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.speed}">Speed</label>
                        <input type="number" class="form-control form-control-sm" id="actFanSpeed" min="0" placeholder="-- not set --" />
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.swing}">Swing</label>
                        <select class="form-control form-control-sm" id="actFanSwing">
                          <option value="">-- not set --</option>
                          <option value="ON">ON</option>
                          <option value="OFF">OFF</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.light}">Light</label>
                        <select class="form-control form-control-sm" id="actFanLight">
                          <option value="">-- not set --</option>
                          <option value="ON">ON</option>
                          <option value="OFF">OFF</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- AIR_CONDITION params -->
                <div id="actParamAc" class="act-param-section" style="display: none">
                  <div class="row">
                    <div class="col-md-4">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.power}">Power</label>
                        <select class="form-control form-control-sm" id="actAcPower">
                          <option value="">-- not set --</option>
                          <option value="ON">ON</option>
                          <option value="OFF">OFF</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.temp}">Temperature (°C)</label>
                        <input type="number" class="form-control form-control-sm" id="actAcTemp" min="16" max="32" placeholder="-- not set --" />
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.mode}">Mode</label>
                        <select class="form-control form-control-sm" id="actAcMode">
                          <option value="">-- not set --</option>
                          <option value="COOL">COOL</option>
                          <option value="HEAT">HEAT</option>
                          <option value="DRY">DRY</option>
                          <option value="FAN">FAN</option>
                          <option value="AUTO">AUTO</option>
                        </select>
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.fan_speed}">Fan Speed</label>
                        <input type="number" class="form-control form-control-sm" id="actAcFanSpeed" min="0" max="5" placeholder="-- not set --" />
                      </div>
                    </div>
                    <div class="col-md-4">
                      <div class="form-group mb-2">
                        <label class="small font-weight-bold" th:text="#{rulev2.modal.action.label.swing}">Swing</label>
                        <select class="form-control form-control-sm" id="actAcSwing">
                          <option value="">-- not set --</option>
                          <option value="ON">ON</option>
                          <option value="OFF">OFF</option>
                        </select>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Placeholder -->
                <div id="actParamPlaceholder" class="act-param-section text-center text-muted py-3">
                  <i class="fas fa-hand-point-up fa-2x mb-2 d-block"></i>
                  <small th:text="#{rulev2.modal.action.placeholder.select_category}">Select a device category to configure action parameters</small>
                </div>
              </div>
            </div>
          </form>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-dismiss="modal">
            <i class="fas fa-times mr-1"></i>
            <span th:text="#{common.btn.cancel}">Cancel</span>
          </button>
          <button type="button" class="btn btn-primary btn-sm" id="btnSaveAction">
            <i class="fas fa-save mr-1"></i>
            <span th:text="#{rulev2.modal.action.title.add}">Save Action</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</th:block>
