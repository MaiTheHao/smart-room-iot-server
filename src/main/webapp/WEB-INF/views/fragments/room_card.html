<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="room_card(room, hardwareCount, latestAvgTemperature, latestSumWatt)">
      <a th:href="@{'/room/' + ${room.id}}" class="card h-100 room-card shadow-sm">
        <!-- Header Image -->
        <div class="room-image-container">
          <img
            src="https://images.unsplash.com/photo-1554995207-c18c203602cb?auto=format&fit=crop&w=600&q=80"
            class="room-image"
            th:alt="${room.name}"
          />
          <div class="status-badge">
            <span class="dot-ping"></span>
            <span th:text="#{index.room.online}">Trực tuyến</span>
          </div>
        </div>

        <!-- Content -->
        <div class="card-body">
          <h5
            class="card-title fw-bold"
            th:text="${room.name != null ? room.name : #messages.msg('index.room.no_name')}"
            >--</h5
          >
          <br />
          <p
            class="text-muted small mb-0 text-truncate"
            th:text="${room.description != null ? room.description : #messages.msg('index.room.no_description')}"
          >
            --
          </p>
        </div>

        <!-- Stats Footer -->
        <div class="card-footer px-2 py-3">
          <div class="row g-0 text-center">
            <div class="col-4 border-end">
              <div class="d-flex flex-column align-items-center">
                <div class="stat-icon-wrapper bg-soft-info">
                  <i data-lucide="cpu" style="width: 20px; height: 20px"></i>
                </div>
                <span class="stat-value" th:text="${hardwareCount != null ? hardwareCount : '--'}"
                  >--</span
                >
                <span class="stat-label" th:text="#{index.room.devices}">Thiết bị</span>
              </div>
            </div>
            <div class="col-4 border-end">
              <div class="d-flex flex-column align-items-center">
                <div class="stat-icon-wrapper bg-soft-warning">
                  <i data-lucide="thermometer" style="width: 20px; height: 20px"></i>
                </div>
                <span
                  class="stat-value"
                  th:text="${latestAvgTemperature != null ? #numbers.formatDecimal(latestAvgTemperature, 1, 1) + '°C' : '--'}"
                  >--</span
                >
                <span class="stat-label" th:text="#{index.room.temp}">Nhiệt độ</span>
              </div>
            </div>
            <div class="col-4">
              <div class="d-flex flex-column align-items-center">
                <div class="stat-icon-wrapper bg-soft-success">
                  <i data-lucide="zap" style="width: 20px; height: 20px"></i>
                </div>
                <span
                  class="stat-value"
                  th:text="${latestSumWatt != null ? #numbers.formatDecimal(latestSumWatt, 1, 1) + 'W' : '--'}"
                  >--</span
                >
                <span class="stat-label" th:text="#{index.room.power}">Công suất</span>
              </div>
            </div>
          </div>
        </div>
      </a>
    </div>
  </body>
</html>
