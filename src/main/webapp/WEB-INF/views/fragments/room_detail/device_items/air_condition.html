<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div
      th:fragment="air_condition(ac)"
      class="d-flex justify-content-between align-items-start mb-3 ac-item"
      th:data-ac-id="${ac.id}"
      th:data-ac-natural-id="${ac.naturalId}"
    >
      <div class="flex-grow-1">
        <div class="d-flex justify-content-between align-items-center">
          <div
            class="d-flex align-items-center flex-grow-1"
            style="cursor: pointer"
            th:onclick="|$(#btn-expand-ac-${ac.id}).click()|"
          >
            <div
              class="icon-box mr-3 default-icon d-flex justify-content-center align-items-center"
              th:classappend="${ac.power == T(com.iviet.ivshs.enumeration.ActuatorPower).ON ? 'active-ac' : ''}"
            >
              <i class="fas fa-wind"></i>
            </div>
            <i class="fas fa-sync-alt text-info loading-icon custom-spin" style="display: none"></i>
            <div>
              <h6
                class="mb-0 font-weight-bold text-dark"
                th:text="${ac.name != null and !ac.name.isEmpty() ? ac.name : '...'}"
              ></h6>
              <small
                class="text-muted ac-status-text"
                th:data-text-off="#{device_card.common.status.off}"
              >
                <th:block th:if="${ac.power == T(com.iviet.ivshs.enumeration.ActuatorPower).ON}">
                  <span th:text="${ac.mode != null ? ac.mode.name() : 'N/A'}"></span>
                  <span> • </span>
                  <span th:text="|${ac.temperature}°C|"></span>
                </th:block>
                <th:block
                  th:unless="${ac.power == T(com.iviet.ivshs.enumeration.ActuatorPower).ON}"
                >
                  <span th:text="#{device_card.common.status.off}"></span>
                </th:block>
              </small>
            </div>
          </div>
          <div class="d-flex align-items-center">
            <div class="custom-control custom-switch scale-125 mr-3">
              <input
                type="checkbox"
                class="custom-control-input ac-master-switch"
                th:id="|acMasterSwitch${ac.id}|"
                th:data-ac-id="${ac.id}"
                th:data-ac-natural-id="${ac.naturalId}"
                th:checked="${ac.power == T(com.iviet.ivshs.enumeration.ActuatorPower).ON}"
              />
              <label class="custom-control-label" th:for="|acMasterSwitch${ac.id}|"></label>
            </div>
            <button
              class="btn btn-link text-muted p-0 btn-expand"
              th:id="|btn-expand-ac-${ac.id}|"
              type="button"
              th:data-target="|#acControls${ac.id}|"
              data-toggle="collapse"
            >
              <i class="fas fa-chevron-down"></i>
            </button>
          </div>
        </div>

        <div
          class="collapse mt-3"
          th:id="|acControls${ac.id}|"
          th:classappend="${ac.power != T(com.iviet.ivshs.enumeration.ActuatorPower).ON ? 'disabled-overlay' : ''}"
        >
          <div class="bg-light rounded p-4">
            <div class="mb-4">
              <small
                class="text-muted d-block mb-2 font-weight-bold text-uppercase"
                style="font-size: 0.7rem"
                th:text="#{device_card.common.description.label}"
              ></small>
              <p
                class="text-dark mb-0"
                style="font-size: 0.875rem"
                th:text="${ac.description != null and !ac.description.isEmpty()} ? ${ac.description} : #{device_card.common.description.empty}"
              ></p>
            </div>

            <div class="text-center mb-4">
              <div class="d-flex justify-content-center align-items-center">
                <button
                  class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center ac-temp-btn ac-temp-decrease"
                  th:data-ac-id="${ac.id}"
                  th:data-ac-natural-id="${ac.naturalId}"
                  style="width: 50px; height: 50px"
                >
                  <i class="fas fa-minus"></i>
                </button>
                <div class="temp-display mx-4">
                  <span class="ac-temp-value font-weight-bold" th:text="${ac.temperature}"></span
                  ><span class="temp-unit">°C</span>
                </div>
                <button
                  class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center ac-temp-btn ac-temp-increase"
                  th:data-ac-id="${ac.id}"
                  th:data-ac-natural-id="${ac.naturalId}"
                  style="width: 50px; height: 50px"
                >
                  <i class="fas fa-plus"></i>
                </button>
              </div>
            </div>

            <!-- Mode Buttons - same pattern as fan mode buttons -->
            <div class="mb-4">
              <small
                class="text-muted d-block mb-3 font-weight-bold text-uppercase"
                style="font-size: 0.7rem"
                th:text="#{device_card.fan.mode.label}"
              ></small>
              <div class="d-flex justify-content-center flex-wrap gap-2">
                <div class="text-center mx-2">
                  <button
                    class="btn btn-outline-secondary ac-mode-btn rounded-circle d-flex align-items-center justify-content-center"
                    th:data-ac-id="${ac.id}"
                    th:data-ac-natural-id="${ac.naturalId}"
                    data-mode="COOL"
                    th:classappend="${ac.mode != null and ac.mode.name() == 'COOL'} ? 'active-mode-cool' : ''"
                    style="width: 56px; height: 56px"
                  >
                    <i class="fas fa-snowflake fa-lg"></i>
                  </button>
                  <small
                    class="text-muted d-block mt-2"
                    style="font-size: 0.7rem"
                    th:text="#{device_card.ac.mode.cool}"
                  ></small>
                </div>

                <div class="text-center mx-2">
                  <button
                    class="btn btn-outline-secondary ac-mode-btn rounded-circle d-flex align-items-center justify-content-center"
                    th:data-ac-id="${ac.id}"
                    th:data-ac-natural-id="${ac.naturalId}"
                    data-mode="HEAT"
                    th:classappend="${ac.mode != null and ac.mode.name() == 'HEAT'} ? 'active-mode-heat' : ''"
                    style="width: 56px; height: 56px"
                  >
                    <i class="fas fa-fire fa-lg"></i>
                  </button>
                  <small
                    class="text-muted d-block mt-2"
                    style="font-size: 0.7rem"
                    th:text="#{device_card.ac.mode.heat}"
                  ></small>
                </div>

                <div class="text-center mx-2">
                  <button
                    class="btn btn-outline-secondary ac-mode-btn rounded-circle d-flex align-items-center justify-content-center"
                    th:data-ac-id="${ac.id}"
                    th:data-ac-natural-id="${ac.naturalId}"
                    data-mode="DRY"
                    th:classappend="${ac.mode != null and ac.mode.name() == 'DRY'} ? 'active-mode-dry' : ''"
                    style="width: 56px; height: 56px"
                  >
                    <i class="fas fa-tint fa-lg"></i>
                  </button>
                  <small
                    class="text-muted d-block mt-2"
                    style="font-size: 0.7rem"
                    th:text="#{device_card.ac.mode.dry}"
                  ></small>
                </div>

                <div class="text-center mx-2">
                  <button
                    class="btn btn-outline-secondary ac-mode-btn rounded-circle d-flex align-items-center justify-content-center"
                    th:data-ac-id="${ac.id}"
                    th:data-ac-natural-id="${ac.naturalId}"
                    data-mode="FAN"
                    th:classappend="${ac.mode != null and ac.mode.name() == 'FAN'} ? 'active-mode-fan' : ''"
                    style="width: 56px; height: 56px"
                  >
                    <i class="fas fa-fan fa-lg"></i>
                  </button>
                  <small
                    class="text-muted d-block mt-2"
                    style="font-size: 0.7rem"
                    th:text="#{device_card.ac.mode.fan}"
                  ></small>
                </div>

                <div class="text-center mx-2">
                  <button
                    class="btn btn-outline-secondary ac-mode-btn rounded-circle d-flex align-items-center justify-content-center"
                    th:data-ac-id="${ac.id}"
                    th:data-ac-natural-id="${ac.naturalId}"
                    data-mode="AUTO"
                    th:classappend="${ac.mode != null and ac.mode.name() == 'AUTO'} ? 'active-mode-auto' : ''"
                    style="width: 56px; height: 56px"
                  >
                    <i class="fas fa-magic fa-lg"></i>
                  </button>
                  <small
                    class="text-muted d-block mt-2"
                    style="font-size: 0.7rem"
                    th:text="#{device_card.ac.mode.auto}"
                  ></small>
                </div>
              </div>
            </div>

            <!-- Fan Speed + Swing - same card style as fan -->
            <div class="bg-white rounded p-3 border">
              <!-- Fan Speed -->
              <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <small
                    class="font-weight-bold text-uppercase text-muted"
                    style="font-size: 0.7rem"
                    th:text="#{device_card.ac.fan_speed}"
                  ></small>
                  <span class="badge badge-primary ac-fan-badge">
                    <th:block
                      th:if="${ac.fanSpeed == 0}"
                      th:text="#{device_card.ac.fan_speed.auto}"
                    ></th:block>
                    <th:block th:unless="${ac.fanSpeed == 0}">
                      <span th:text="#{device_card.ac.fan_speed.level}"></span>
                      <span th:text="${ac.fanSpeed}"></span>
                    </th:block>
                  </span>
                </div>
                <input
                  type="range"
                  class="custom-range w-100 ac-fan-slider"
                  th:data-ac-id="${ac.id}"
                  th:data-ac-natural-id="${ac.naturalId}"
                  min="0"
                  max="5"
                  th:value="${ac.fanSpeed}"
                />
                <div class="d-flex justify-content-between">
                  <small
                    class="text-muted"
                    style="font-size: 0.65rem"
                    th:text="#{device_card.ac.fan_speed.auto}"
                  ></small>
                  <small class="text-muted" style="font-size: 0.65rem">5</small>
                </div>
              </div>

              <div class="d-flex justify-content-between align-items-center pt-2 border-top">
                <small
                  class="font-weight-bold text-uppercase text-muted"
                  style="font-size: 0.7rem"
                  th:text="#{device_card.ac.swing}"
                ></small>
                <div class="d-flex align-items-center">
                  <div class="custom-control custom-switch">
                    <input
                      type="checkbox"
                      class="custom-control-input ac-swing-switch"
                      th:id="|acSwingSwitch${ac.id}|"
                      th:data-ac-id="${ac.id}"
                      th:data-ac-natural-id="${ac.naturalId}"
                      th:checked="${ac.swing == T(com.iviet.ivshs.enumeration.ActuatorSwing).ON}"
                    />
                    <label class="custom-control-label" th:for="|acSwingSwitch${ac.id}|"></label>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
