<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <div
      th:fragment="air_condition(ac)"
      class="d-flex justify-content-between align-items-start mb-3 ac-item"
      th:data-ac-id="${ac.id}"
    >
      <div class="flex-grow-1">
        <div class="d-flex justify-content-between align-items-center">
          <div
            class="d-flex align-items-center flex-grow-1"
            style="cursor: pointer"
            th:onclick="'$(\'#btn-expand-ac-' + ${ac.id} + '\').click()'"
          >
            <div
              class="icon-box mr-3 default-icon d-flex justify-content-center align-items-center"
              th:classappend="${ac.power == T(com.iviet.ivshs.enumeration.ActuatorPower).ON ? 'active-ac' : ''}"
            >
              <i class="fas fa-wind"></i>
            </div>
            <i class="fas fa-sync-alt text-info loading-icon custom-spin" style="display: none"></i>
            <div>
              <h6 class="mb-0 font-weight-bold text-dark" th:text="${ac.name}"></h6>
              <small class="text-muted ac-status-text">
                <th:block
                  th:if="${ac.power == T(com.iviet.ivshs.enumeration.ActuatorPower).ON}"
                  th:text="(${ac.mode != null ? ac.mode.name() : 'N/A'}) + ' • ' + ${ac.temperature} + '°C'"
                ></th:block>
                <th:block
                  th:unless="${ac.power == T(com.iviet.ivshs.enumeration.ActuatorPower).ON}"
                  th:text="#{device_card.common.status.off}"
                ></th:block>
              </small>
            </div>
          </div>
          <div class="d-flex align-items-center">
            <div class="custom-control custom-switch scale-125 mr-3">
              <input
                type="checkbox"
                class="custom-control-input ac-master-switch"
                th:id="'acMasterSwitch' + ${ac.id}"
                th:data-ac-id="${ac.id}"
                th:checked="${ac.power == T(com.iviet.ivshs.enumeration.ActuatorPower).ON}"
              />
              <label class="custom-control-label" th:for="'acMasterSwitch' + ${ac.id}"></label>
            </div>
            <button
              class="btn btn-link text-muted p-0 btn-expand"
              th:id="'btn-expand-ac-' + ${ac.id}"
              type="button"
              th:data-target="'#acControls' + ${ac.id}"
              data-toggle="collapse"
            >
              <i class="fas fa-chevron-down"></i>
            </button>
          </div>
        </div>

        <div
          class="collapse mt-3"
          th:id="'acControls' + ${ac.id}"
          th:classappend="${ac.power != T(com.iviet.ivshs.enumeration.ActuatorPower).ON ? 'disabled-overlay' : ''}"
        >
          <div class="bg-light rounded p-4">
            <div class="mb-4">
              <small
                class="text-muted d-block mb-2 font-weight-bold text-uppercase"
                style="font-size: 0.7rem"
                th:text="#{device_card.common.description.label}"
              ></small>
              <p
                class="text-dark mb-0"
                style="font-size: 0.875rem"
                th:text="${ac.description != null and !ac.description.isEmpty()} ? ${ac.description} : #{device_card.common.description.empty}"
              ></p>
            </div>

            <div class="text-center mb-4">
              <div class="d-flex justify-content-center align-items-center">
                <button
                  class="btn btn-white border shadow-sm rounded-circle ac-temp-decrease"
                  th:data-ac-id="${ac.id}"
                  style="width: 50px; height: 50px"
                >
                  <i class="fas fa-minus text-muted"></i>
                </button>
                <div class="temp-display mx-4">
                  <span class="ac-temp-value" th:text="${ac.temperature}"></span
                  ><span class="unit">°C</span>
                </div>
                <button
                  class="btn btn-white border shadow-sm rounded-circle ac-temp-increase"
                  th:data-ac-id="${ac.id}"
                  style="width: 50px; height: 50px"
                >
                  <i class="fas fa-plus text-dark"></i>
                </button>
              </div>
            </div>

            <div class="d-flex justify-content-center mb-4">
              <div class="mx-2 text-center">
                <button
                  class="btn btn-mode ac-mode-btn"
                  th:data-ac-id="${ac.id}"
                  data-mode="COOL"
                  th:classappend="${ac.mode != null && ac.mode.name() == 'COOL' ? 'active-cool' : ''}"
                >
                  <i class="fas fa-snowflake"></i>
                </button>
                <small class="text-muted text-xs" th:text="#{device_card.ac.mode.cool}"></small>
              </div>
              <div class="mx-2 text-center">
                <button
                  class="btn btn-mode ac-mode-btn"
                  th:data-ac-id="${ac.id}"
                  data-mode="HEAT"
                  th:classappend="${ac.mode != null && ac.mode.name() == 'HEAT' ? 'active-heat' : ''}"
                >
                  <i class="fas fa-fire"></i>
                </button>
                <small class="text-muted text-xs" th:text="#{device_card.ac.mode.heat}"></small>
              </div>
              <div class="mx-2 text-center">
                <button
                  class="btn btn-mode ac-mode-btn"
                  th:data-ac-id="${ac.id}"
                  data-mode="DRY"
                  th:classappend="${ac.mode != null && ac.mode.name() == 'DRY' ? 'active-dry' : ''}"
                >
                  <i class="fas fa-tint"></i>
                </button>
                <small class="text-muted text-xs" th:text="#{device_card.ac.mode.dry}"></small>
              </div>
              <div class="mx-2 text-center">
                <button
                  class="btn btn-mode ac-mode-btn"
                  th:data-ac-id="${ac.id}"
                  data-mode="FAN"
                  th:classappend="${ac.mode != null && ac.mode.name() == 'FAN' ? 'active-fan' : ''}"
                >
                  <i class="fas fa-fan"></i>
                </button>
                <small class="text-muted text-xs" th:text="#{device_card.ac.mode.fan}"></small>
              </div>
            </div>

            <div class="bg-white rounded p-3 border text-center">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <span
                  class="text-xs font-weight-bold text-uppercase text-muted"
                  th:text="#{device_card.ac.fan_speed}"
                ></span>
                <span
                  class="badge badge-primary ac-fan-badge"
                  th:text="${ac.fanSpeed == 0} ? #{device_card.ac.fan_speed.auto} : (#{device_card.ac.fan_speed.level} + ' ' + ${ac.fanSpeed})"
                ></span>
              </div>
              <input
                type="range"
                class="custom-range w-100 mb-3 ac-fan-slider"
                th:data-ac-id="${ac.id}"
                min="0"
                max="5"
                th:value="${ac.fanSpeed}"
              />

              <div class="d-flex justify-content-between align-items-center pt-2 border-top">
                <span
                  class="text-xs font-weight-bold text-uppercase text-muted"
                  th:text="#{device_card.ac.swing}"
                ></span>
                <div class="custom-control custom-switch">
                  <input
                    type="checkbox"
                    class="custom-control-input ac-swing-switch"
                    th:id="'swingSwitch' + ${ac.id}"
                    th:data-ac-id="${ac.id}"
                    th:checked="${ac.swing == T(com.iviet.ivshs.enumeration.ActuatorSwing).ON}"
                  />
                  <label
                    class="custom-control-label font-weight-bold text-xs ac-swing-label"
                    th:for="'swingSwitch' + ${ac.id}"
                    th:text="${ac.swing == T(com.iviet.ivshs.enumeration.ActuatorSwing).ON} ? #{device_card.common.on} : #{device_card.common.off}"
                    th:classappend="${ac.swing == T(com.iviet.ivshs.enumeration.ActuatorSwing).ON ? 'text-success' : ''}"
                  ></label>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
