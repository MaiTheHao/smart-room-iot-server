<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <body>
    <!-- 
        FRAGMENT: fan
        DESCRIPTION: Renders a single fan control unit with full controls (speed, mode, swing, light).
        PARAMETERS:
            - fan: The fan object containing id, naturalId, name, type (GPIO/IR), power status, etc.
    -->
    <div
      th:fragment="fan(fan)"
      class="d-flex justify-content-between align-items-start mb-3 fan-item"
      th:data-fan-id="${fan.id}"
      th:data-fan-type="${fan.type}"
    >
      <div class="flex-grow-1">
        <div class="d-flex justify-content-between align-items-center">
          <div
            class="d-flex align-items-center flex-grow-1"
            style="cursor: pointer"
            th:onclick="'$(\'#btn-expand-fan-' + ${fan.id} + '\').click()'"
          >
            <div
              class="icon-box mr-3 default-icon d-flex justify-content-center align-items-center"
              th:classappend="${fan.power == T(com.iviet.ivshs.enumeration.ActuatorPower).ON ? 'active-fan' : ''}"
            >
              <i class="fas fa-fan"></i>
            </div>
            <i class="fas fa-sync-alt text-info loading-icon custom-spin" style="display: none"></i>
            <div>
              <h6 class="mb-0 font-weight-bold text-dark" th:text="${fan.name}">Fan Name</h6>
              <small
                class="text-muted fan-status-text"
                th:text="${fan.power == T(com.iviet.ivshs.enumeration.ActuatorPower).ON ? (fan.type == T(com.iviet.ivshs.enumeration.FanType).IR && fan.mode != null ? fan.mode.name() + ' • Speed ' + fan.speed : 'Đang bật') : 'Đã tắt'}"
                >Status</small
              >
            </div>
          </div>
          <div class="d-flex align-items-center">
            <div class="custom-control custom-switch scale-125 mr-3">
              <input
                type="checkbox"
                class="custom-control-input fan-master-switch"
                th:id="'fanMasterSwitch' + ${fan.id}"
                th:data-fan-id="${fan.id}"
                th:data-fan-natural-id="${fan.naturalId}"
                th:checked="${fan.power == T(com.iviet.ivshs.enumeration.ActuatorPower).ON}"
              />
              <label class="custom-control-label" th:for="'fanMasterSwitch' + ${fan.id}"></label>
            </div>
            <button
              class="btn btn-link text-muted p-0 btn-expand"
              th:id="'btn-expand-fan-' + ${fan.id}"
              type="button"
              th:data-target="'#fanControls' + ${fan.id}"
              data-toggle="collapse"
            >
              <i class="fas fa-chevron-down"></i>
            </button>
          </div>
        </div>

        <div
          class="collapse mt-3"
          th:id="'fanControls' + ${fan.id}"
          th:classappend="${fan.power != T(com.iviet.ivshs.enumeration.ActuatorPower).ON ? 'disabled-overlay' : ''}"
        >
          <div class="bg-light rounded p-4">
            <!-- Description Section -->
            <div class="mb-4">
              <small
                class="text-muted d-block mb-2 font-weight-bold text-uppercase"
                style="font-size: 0.7rem"
                >Mô tả</small
              >
              <p
                class="text-dark mb-0"
                style="font-size: 0.875rem"
                th:text="${fan.description != null and !fan.description.isEmpty() ? fan.description : 'Không có mô tả'}"
              >
                Description
              </p>
            </div>

            <!-- GPIO Fan: Simple On/Off Message -->
            <div
              th:if="${fan.type == T(com.iviet.ivshs.enumeration.FanType).GPIO}"
              class="text-center py-4"
            >
              <i class="fas fa-fan fa-3x text-secondary mb-3"></i>
              <p class="text-muted mb-0">Quạt GPIO - Chỉ hỗ trợ bật/tắt</p>
            </div>

            <!-- IR Fan: Full Controls -->
            <div th:if="${fan.type == T(com.iviet.ivshs.enumeration.FanType).IR}">
              <!-- Mode Selection -->
              <div class="mb-4">
                <small
                  class="text-muted d-block mb-3 font-weight-bold text-uppercase"
                  style="font-size: 0.7rem"
                  >Chế độ</small
                >
                <div class="d-flex justify-content-center">
                  <div class="mx-2 text-center">
                    <button
                      class="btn btn-outline-secondary btn-mode rounded-circle p-3"
                      th:data-fan-id="${fan.id}"
                      th:data-fan-natural-id="${fan.naturalId}"
                      data-mode="NORMAL"
                      th:classappend="${fan.mode != null && fan.mode.name() == 'NORMAL' ? 'active-mode' : ''}"
                      style="width: 60px; height: 60px"
                    >
                      <i class="fas fa-wind fa-lg"></i>
                    </button>
                    <small class="text-muted d-block mt-2" style="font-size: 0.7rem">Normal</small>
                  </div>
                  <div class="mx-2 text-center">
                    <button
                      class="btn btn-outline-secondary btn-mode rounded-circle p-3"
                      th:data-fan-id="${fan.id}"
                      th:data-fan-natural-id="${fan.naturalId}"
                      data-mode="SLEEP"
                      th:classappend="${fan.mode != null && fan.mode.name() == 'SLEEP' ? 'active-mode' : ''}"
                      style="width: 60px; height: 60px"
                    >
                      <i class="fas fa-moon fa-lg"></i>
                    </button>
                    <small class="text-muted d-block mt-2" style="font-size: 0.7rem">Sleep</small>
                  </div>
                  <div class="mx-2 text-center">
                    <button
                      class="btn btn-outline-secondary btn-mode rounded-circle p-3"
                      th:data-fan-id="${fan.id}"
                      th:data-fan-natural-id="${fan.naturalId}"
                      data-mode="NATURAL"
                      th:classappend="${fan.mode != null && fan.mode.name() == 'NATURAL' ? 'active-mode' : ''}"
                      style="width: 60px; height: 60px"
                    >
                      <i class="fas fa-leaf fa-lg"></i>
                    </button>
                    <small class="text-muted d-block mt-2" style="font-size: 0.7rem">Natural</small>
                  </div>
                </div>
              </div>

              <!-- Speed Control -->
              <div class="bg-white rounded p-3 border mb-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <span class="text-xs font-weight-bold text-uppercase text-muted"
                    >Tốc độ quạt</span
                  >
                  <span
                    class="badge badge-primary fan-speed-display"
                    th:text="${fan.speed != null ? fan.speed : 0}"
                    >0</span
                  >
                </div>
                <input
                  type="range"
                  class="custom-range w-100 fan-speed-slider"
                  th:data-fan-id="${fan.id}"
                  th:data-fan-natural-id="${fan.naturalId}"
                  min="0"
                  max="9"
                  th:value="${fan.speed != null && fan.speed <= 9 ? fan.speed : 0}"
                />
              </div>

              <!-- Swing & Light Controls -->
              <div class="bg-white rounded p-3 border">
                <div
                  class="d-flex justify-content-between align-items-center mb-3 pb-3 border-bottom"
                >
                  <span class="text-xs font-weight-bold text-uppercase text-muted"
                    ><i class="fas fa-random mr-2"></i>Đảo gió</span
                  >
                  <div class="custom-control custom-switch">
                    <input
                      type="checkbox"
                      class="custom-control-input fan-swing-switch"
                      th:id="'fanSwingSwitch' + ${fan.id}"
                      th:data-fan-id="${fan.id}"
                      th:data-fan-natural-id="${fan.naturalId}"
                      th:checked="${fan.swing == T(com.iviet.ivshs.enumeration.ActuatorSwing).ON}"
                    />
                    <label
                      class="custom-control-label"
                      th:for="'fanSwingSwitch' + ${fan.id}"
                    ></label>
                  </div>
                </div>

                <div class="d-flex justify-content-between align-items-center">
                  <span class="text-xs font-weight-bold text-uppercase text-muted"
                    ><i class="fas fa-lightbulb mr-2"></i>Đèn</span
                  >
                  <div class="custom-control custom-switch">
                    <input
                      type="checkbox"
                      class="custom-control-input fan-light-switch"
                      th:id="'fanLightSwitch' + ${fan.id}"
                      th:data-fan-id="${fan.id}"
                      th:data-fan-natural-id="${fan.naturalId}"
                      th:checked="${fan.light == T(com.iviet.ivshs.enumeration.ActuatorState).ON}"
                    />
                    <label
                      class="custom-control-label"
                      th:for="'fanLightSwitch' + ${fan.id}"
                    ></label>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
