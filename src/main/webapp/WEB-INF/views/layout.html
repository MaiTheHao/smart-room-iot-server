<!doctype html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">Smart Room</title>

		<!-- Local Fonts & Global Styles -->
		<link rel="stylesheet" th:href="@{/css/global.css}" />
		<!-- OverlayScrollbars -->
		<link rel="stylesheet" th:href="@{/css/lib/overlayscrollbars.min.css}" />
		<!-- AdminLTE 4 -->
		<link rel="stylesheet" th:href="@{/css/lib/adminlte.min.css}" />
		<link rel="icon" type="image/webp" th:href="@{/imgs/logo_genesistech.webp}" />

		<th:block layout:fragment="styles"></th:block>
	</head>
	<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
		<div class="app-wrapper">
			<nav class="app-header navbar navbar-expand bg-body" th:fragment="header">
				<div class="container-fluid">
					<ul class="navbar-nav">
						<li class="nav-item">
							<a class="nav-link" data-lte-toggle="sidebar" href="#" role="button">
								<i data-lucide="menu"></i>
							</a>
						</li>
						<li class="nav-item d-none d-md-block">
							<a th:href="@{/}" class="nav-link" th:text="#{nav.home}">Home</a>
						</li>
					</ul>
					<ul class="navbar-nav ms-auto">
						<li class="nav-item d-flex align-items-center me-2">
							<a th:href="@{''(lang='vi')}" class="lang-switcher-link" th:classappend="${#locale.language == 'vi' ? 'active' : ''}" th:title="#{lang.vietnamese}">
								<img th:src="@{/imgs/vietnam512x512.png}" class="lang-flag" alt="VI" />
							</a>
							<a th:href="@{''(lang='en')}" class="lang-switcher-link mx-2" th:classappend="${#locale.language == 'en' ? 'active' : ''}" th:title="#{lang.english}">
								<img th:src="@{/imgs/united-kingdom512x512.png}" class="lang-flag" alt="EN" />
							</a>
						</li>
						<li class="nav-item dropdown user-menu">
							<a href="#" class="nav-link dropdown-toggle d-flex align-items-center" data-bs-toggle="dropdown">
								<img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=random" class="user-image rounded-circle shadow-sm me-2" alt="User Image" style="width: 32px; height: 32px" />
								<span id="userName" class="d-none d-md-inline small fw-semibold" th:text="#{user.default_name}">Tên người dùng</span>
							</a>
							<ul class="dropdown-menu dropdown-menu-lg dropdown-menu-end border-0 shadow">
								<li class="user-header text-bg-primary d-flex flex-column align-items-center justify-content-center p-3" style="height: auto">
									<img id="userAvatarLarge" src="https://ui-avatars.com/api/?name=User&background=random" class="rounded-circle shadow-sm mb-2" alt="User Image" style="width: 64px; height: 64px" />
									<p class="mb-0 fw-bold">
										<span id="userFullName" th:text="#{user.default_name}">Tên người dùng</span>
									</p>
								</li>
								<li><hr class="dropdown-divider m-0" /></li>
								<li>
									<a href="#" class="dropdown-item py-2 d-flex align-items-center">
										<i data-lucide="user" class="me-3 opacity-75" style="width: 18px"></i>
										<span th:text="#{menu.profile}">Hồ sơ cá nhân</span>
									</a>
								</li>
								<li>
									<a href="#" class="dropdown-item py-2 d-flex align-items-center">
										<i data-lucide="settings" class="me-3 opacity-75" style="width: 18px"></i>
										<span th:text="#{menu.settings}">Cài đặt hệ thống</span>
									</a>
								</li>
								<li><hr class="dropdown-divider m-0" /></li>
								<li>
									<a href="#" class="dropdown-item py-2 d-flex align-items-center text-danger" id="logoutBtn">
										<i data-lucide="log-out" class="me-3 opacity-75" style="width: 18px"></i>
										<span class="fw-bold" th:text="#{menu.logout}">Đăng xuất</span>
									</a>
								</li>
							</ul>
						</li>
					</ul>
				</div>
			</nav>

			<aside class="app-sidebar bg-body-secondary shadow" data-bs-theme="dark" th:fragment="sidebar">
				<div class="sidebar-brand">
					<a th:href="@{/}" class="brand-link">
						<img th:src="@{/imgs/logo_genesistech.webp}" alt="Logo" class="brand-image rounded-circle shadow-sm" style="opacity: .8" />
						<span class="brand-text fw-light">Smart Room</span>
					</a>
				</div>
				<div class="sidebar-wrapper">
					<nav class="mt-2">
						<ul class="nav sidebar-menu flex-column" data-lte-toggle="treeview" role="menu" data-accordion="false" id="sidebarMenu"></ul>
					</nav>
				</div>
			</aside>

			<main class="app-main">
				<div class="app-content-header">
					<div class="container-fluid">
						<div class="row">
							<div class="col-sm-6">
								<h3 class="mb-0" layout:fragment="header-title">Page Title</h3>
							</div>
						</div>
					</div>
				</div>
				<div class="app-content">
					<div class="container-fluid">
						<div layout:fragment="content"></div>
					</div>
				</div>
			</main>

			<footer class="app-footer text-center" th:fragment="footer"><strong th:text="#{footer.copyright}">Copyright</strong> &copy; 2024 <span class="text-primary fw-bold">Smart Room</span>. <span th:text="#{footer.rights}">All rights reserved.</span></footer>
		</div>

		<script th:src="@{/js/lib/overlayscrollbars.min.js}"></script>
		<script th:src="@{/js/lib/popper.min.js}"></script>
		<script th:src="@{/js/lib/bootstrap.min.js}"></script>
		<script th:src="@{/js/lib/apexcharts.min.js}"></script>
		<script th:src="@{/js/lib/lucide.min.js}"></script>
		<script th:src="@{/js/lib/sweetalert2.min.js}"></script>
		<script th:src="@{/js/lib/adminlte.min.js}"></script>

		<script>
			window.renderIcons = () => {
				if (typeof lucide !== 'undefined') {
					lucide.createIcons();
				}
			};
		</script>
		<script th:src="@{/js/pages/layout.js}"></script>
		<th:block layout:fragment="scripts"></th:block>
	</body>
</html>
