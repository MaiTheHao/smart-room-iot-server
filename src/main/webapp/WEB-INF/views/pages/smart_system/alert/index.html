<!doctype html>
<html
  th:lang="${#locale.language}"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout.html}"
>
  <head>
    <title th:text="#{smart_system.alert.instance.title}">Alert Events</title>
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" th:href="@{/css/lib/flatpickr.min.css}" />
    <style>
      .alert-feed { display: flex; flex-direction: column; gap: 0.75rem; }
      .alert-card {
        background: #fff;
        border-radius: 0.75rem;
        box-shadow: 0 1px 4px rgba(0,0,0,.08);
        border-left: 4px solid #dee2e6;
        padding: 1rem 1.25rem;
        cursor: pointer;
        transition: box-shadow 0.18s, transform 0.15s;
        text-decoration: none;
        color: inherit;
        display: block;
      }
      .alert-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.13); transform: translateY(-1px); color: inherit; }
      .alert-card.severity-CRITICAL { border-left-color: #dc3545; }
      .alert-card.severity-WARNING  { border-left-color: #ffc107; }
      .alert-card.severity-INFO     { border-left-color: #0dcaf0; }
      .alert-card-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.2rem; color: #1a1a2e; }
      .alert-card-body  { font-size: 0.83rem; color: #6c757d; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 0.5rem; }
      .alert-card-meta  { font-size: 0.76rem; color: #adb5bd; display: flex; flex-wrap: wrap; gap: 0.4rem; align-items: center; }
      .chip { display: inline-block; padding: 0.15rem 0.55rem; border-radius: 999px; font-size: 0.73rem; font-weight: 600; }
      .chip-namespace { background: #e2e8f0; color: #475569; }
      .chip-code      { background: #f1f5f9; color: #334155; font-family: monospace; }
      #loadMoreBtn    { display: none; }
      .filter-label   { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #6c757d; margin-bottom: 0.25rem; display: block; }
    </style>
  </head>

  <div layout:fragment="header-title">
    <span th:text="#{smart_system.alert.instance.title}">Alert Events</span>
  </div>

  <div layout:fragment="content">
    <div class="container-fluid">

      <!-- Filter Bar -->
      <div class="card rounded-4 border-0 shadow-sm mb-4">
        <div class="card-body py-3">
          <div class="row g-3 align-items-end">
            <!-- Namespace Filter -->
            <div class="col-md-2 col-sm-6">
              <label class="filter-label" th:text="#{smart_system.alert.instance.filter.namespace}">Namespace</label>
              <select class="form-select bg-light border-0" id="filterNamespace">
                <option value="">-- All --</option>
                <option value="RULE">RULE</option>
                <option value="GATEWAY">GATEWAY</option>
                <option value="SYSTEM">SYSTEM</option>
              </select>
            </div>
            <!-- Status Filter -->
            <div class="col-md-2 col-sm-6">
              <label class="filter-label" th:text="#{smart_system.alert.instance.table.status}">Status</label>
              <select class="form-select bg-light border-0" id="filterStatus">
                <option value="">-- All --</option>
                <option value="ACTIVE">ACTIVE</option>
                <option value="ACKNOWLEDGED">ACKNOWLEDGED</option>
                <option value="RESOLVED">RESOLVED</option>
              </select>
            </div>
            <!-- Date Range -->
            <div class="col-md-4 col-sm-12">
              <label class="filter-label" th:text="#{smart_system.alert.instance.filter.date_range}">Date Range</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-0"><i data-lucide="calendar" style="width:16px;height:16px"></i></span>
                <input type="text" class="form-control bg-light border-0" id="filterDateRange" th:placeholder="#{smart_system.alert.instance.filter.date_range_placeholder}" readonly />
              </div>
            </div>
            <!-- Actions -->
            <div class="col-md-4 col-sm-12 d-flex gap-2 justify-content-md-end justify-content-start">
              <button class="btn btn-outline-secondary rounded-pill px-3" id="btnClearFilters">
                <i data-lucide="x" class="lucide-sm me-1"></i>
                <span th:text="#{common.clear}">Clear</span>
              </button>
              <button class="btn btn-outline-primary rounded-pill px-3" id="btnReloadAlerts">
                <i data-lucide="refresh-cw" class="lucide-sm me-1"></i>
                <span th:text="#{common.reload}">Reload</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Alert Feed -->
      <div class="card rounded-4 border-0 shadow-sm">
        <div class="card-header bg-white border-0 py-3 d-flex align-items-center">
          <h6 class="fw-bold m-0 me-auto d-flex align-items-center">
            <i data-lucide="bell-ring" class="text-primary me-2 lucide-sm"></i>
            <span th:text="#{smart_system.alert.instance.list.title}">Alert Events</span>
          </h6>
          <span id="alertCount" class="badge bg-primary-subtle text-primary rounded-pill px-3"></span>
        </div>
        <div class="card-body pt-0 pb-3">
          <!-- Loading skeleton -->
          <div id="alertLoading" class="py-5 text-center text-muted d-none">
            <div class="spinner-border spinner-border-sm me-2"></div>
            <span th:text="#{common.loading}">Loading...</span>
          </div>
          <!-- Empty state -->
          <div id="alertEmpty" class="py-5 text-center text-muted d-none">
            <i data-lucide="inbox" class="mb-2 opacity-50" style="width:48px;height:48px"></i>
            <p class="mb-0" th:text="#{smart_system.alert.instance.no_data}">No alerts found.</p>
          </div>
          <!-- Feed container -->
          <div id="alertFeed" class="alert-feed"></div>
          <!-- Load More -->
          <div class="text-center mt-3">
            <button class="btn btn-outline-secondary rounded-pill px-4" id="loadMoreBtn">
              <i data-lucide="chevrons-down" class="lucide-sm me-1"></i>
              <span th:text="#{common.load_more}">Load More</span>
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <th:block layout:fragment="scripts">
    <script th:inline="javascript">
      window.__ALERT_LIST_CONFIG__ = {
        baseDetailUrl: /*[[#{smart_system.alert.instance.detail.base_url}]]*/ '/management/smart-system/alerts',
        i18n: {
          noData:        /*[[#{smart_system.alert.instance.no_data}]]*/ 'No alerts found.',
          error:         /*[[#{common.error.title}]]*/ 'Error',
          loading:       /*[[#{common.loading}]]*/ 'Loading...',
          loadMore:      /*[[#{common.load_more}]]*/ 'Load More',
          justNow:       /*[[#{smart_system.alert.instance.time.just_now}]]*/ 'Just now',
          triggerCount:  /*[[#{smart_system.alert.instance.trigger_count}]]*/ 'Triggered',
        }
      };
    </script>
    <!-- Flatpickr JS -->
    <script th:src="@{/js/lib/flatpickr.min.js}"></script>
    <script type="module" th:src="@{/js/pages/smart_system/alert/index.js}"></script>
  </th:block>
</html>
