<!doctype html>
<html
  th:lang="${#locale.language}"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{layout.html}"
>
  <head>
    <title>Rule Management</title>
    <!-- Tabulator CSS -->
    <link rel="stylesheet" th:href="@{/css/lib/tabulator.min.css}" />
  </head>
    <div layout:fragment="header-title">
      <span th:text="#{smart_system.rule.title}">Rule Management</span>
    </div>

    <div layout:fragment="content">
      <div class="container-fluid">
        <!-- Data Table Card -->
        <div class="card rounded-4 border-0 shadow-sm transition-all hover-shadow">
          <div class="card-header bg-white border-0 py-3 d-flex align-items-center">
            <h6 class="fw-bold m-0 me-auto d-flex align-items-center">
              <i data-lucide="git-branch" class="text-primary me-2 lucide-sm"></i>
              <span th:text="#{smart_system.rule.list.title}">Rules List</span>
            </h6>
            <div class="d-flex gap-2">
              <button class="btn btn-outline-primary btn-sm rounded-pill px-3" id="btnReload">
                <i data-lucide="refresh-cw" class="lucide-sm me-1"></i>
                <span th:text="#{common.reload}">Reload</span>
              </button>
              <button class="btn btn-primary btn-sm rounded-pill px-3" id="btnAdd">
                <i data-lucide="plus" class="lucide-sm me-1"></i>
                <span th:text="#{common.add}">Add</span>
              </button>
              <button
                class="btn btn-danger btn-sm rounded-pill px-3"
                id="btnDeleteSelected"
                disabled
              >
                <i data-lucide="trash-2" class="lucide-sm me-1"></i>
                <span th:text="#{common.delete}">Delete</span>
              </button>
            </div>
          </div>
          <div class="card-body p-0">
            <div id="rulesTable"></div>
          </div>
        </div>
      </div>

      <!-- Rule Form Modal -->
      <div class="modal fade" id="ruleModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pb-0">
              <h5 class="modal-title fw-bold d-flex align-items-center">
                <i data-lucide="git-branch" class="text-primary me-2 lucide-md"></i>
                <span id="modalTitle" th:text="#{smart_system.rule.modal.add_title}">Add New Rule</span>
              </h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="ruleForm" novalidate>
              <div class="modal-body py-4">
                <input type="hidden" id="ruleId" name="id" />
                <div class="row g-3">
                  <!-- Name -->
                  <div class="col-12">
                    <label for="name" class="form-label fw-semibold small text-muted text-uppercase mb-1" th:text="#{smart_system.rule.name}">Name</label>
                    <div class="input-group">
                      <span class="input-group-text bg-light border-0"><i data-lucide="tag" class="lucide-sm"></i></span>
                      <input type="text" class="form-control bg-light border-0" id="name" name="name" th:placeholder="#{smart_system.rule.placeholder.name}" placeholder="Rule Name" />
                    </div>
                    <div class="invalid-feedback" id="val-name"></div>
                  </div>

                  <!-- Priority & Interval -->
                  <div class="col-md-6">
                    <label for="priority" class="form-label fw-semibold small text-muted text-uppercase mb-1" th:text="#{smart_system.rule.priority}">Priority</label>
                    <div class="input-group">
                      <span class="input-group-text bg-light border-0"><i data-lucide="sliders" class="lucide-sm"></i></span>
                      <input type="number" class="form-control bg-light border-0" id="priority" name="priority" min="0" th:placeholder="#{smart_system.rule.placeholder.priority}" placeholder="1" />
                    </div>
                    <div class="invalid-feedback" id="val-priority"></div>
                  </div>

                  <div class="col-md-6">
                    <label for="intervalSeconds" class="form-label fw-semibold small text-muted text-uppercase mb-1" th:text="#{smart_system.rule.interval}">Interval (seconds)</label>
                    <div class="input-group">
                      <span class="input-group-text bg-light border-0"><i data-lucide="clock" class="lucide-sm"></i></span>
                      <input type="number" class="form-control bg-light border-0" id="intervalSeconds" name="intervalSeconds" min="60" th:placeholder="#{smart_system.rule.placeholder.interval}" placeholder="60" />
                    </div>
                    <div class="invalid-feedback" id="val-intervalSeconds"></div>
                  </div>


                </div>
              </div>
              <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal" th:text="#{logout.cancel.button}">Cancel</button>
                <button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm" id="btnSubmitRule">
                  <i data-lucide="save" class="lucide-sm me-1"></i>
                  <span th:text="#{index.scene.trigger.confirm}">Confirm</span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <th:block layout:fragment="scripts">
      <script th:inline="javascript">
        window.__RULE_CONFIG__ = {
          i18n: {
            colId: /*[[#{client.table.id}]]*/ 'ID',
            colName: /*[[#{function.table.name}]]*/ 'Name',
            colPriority: /*[[#{smart_system.rule.priority}]]*/ 'Priority',
            colInterval: /*[[#{smart_system.rule.interval}]]*/ 'Interval (s)',
            colStatus: 'Status',
            colActions: /*[[#{client.table.actions}]]*/ 'Actions',
            noData: /*[[#{rule.table.no_data}]]*/ 'No data found.',
            addTitle: /*[[#{smart_system.rule.modal.add_title}]]*/ 'Add Rule',
            editTitle: /*[[#{smart_system.rule.modal.edit_title}]]*/ 'Edit Rule',
            createdSuccess: /*[[#{smart_system.rule.success.created}]]*/ 'Success',
            updatedSuccess: /*[[#{smart_system.rule.success.updated}]]*/ 'Success',
            confirmDelete: /*[[#{common.confirm.delete}]]*/ 'Delete?',
            confirmDeleteTextSingle: /*[[#{common.confirm.delete_single}]]*/ 'Delete item?',
            confirmDeleteTextBatch: /*[[#{common.confirm.delete_batch}]]*/ 'Delete items?',
            yesDelete: /*[[#{common.yes_delete}]]*/ 'Yes, delete',
            cancel: /*[[#{logout.cancel.button}]]*/ 'Cancel',
            processing: /*[[#{common.processing}]]*/ 'Processing...',
            success: /*[[#{common.success}]]*/ 'Success',
            error: /*[[#{common.error.title}]]*/ 'Error',
            valRequired: /*[[#{common.val.required}]]*/ 'Required',
            valPriorityRequired: /*[[#{smart_system.rule.val.priority_required}]]*/ 'Priority is required',
            valPriorityMin: /*[[#{smart_system.rule.val.priority_min}]]*/ 'Priority must be >= 0',
            valIntervalRequired: /*[[#{smart_system.rule.val.interval_required}]]*/ 'Interval is required',
            valIntervalMin: /*[[#{smart_system.rule.val.interval_min}]]*/ 'Interval must be >= 60 seconds',
            manageConditions: /*[[#{smart_system.rule.conditions.list}]]*/ 'Manage Conditions',
            manageActions: /*[[#{smart_system.rule.actions.list}]]*/ 'Manage Actions'
          },
        };
      </script>

      <script type="module" th:src="@{/js/pages/smart_system/rule/rules/index.js}"></script>
    </th:block>
</html>
