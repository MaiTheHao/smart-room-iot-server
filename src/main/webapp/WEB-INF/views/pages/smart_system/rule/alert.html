<!doctype html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout.html}">
  <head>
    <title th:text="#{smart_system.alert.rule_title(${rule.name})}">Alert Configuration</title>
    <!-- Tabulator CSS -->
    <link rel="stylesheet" th:href="@{/css/lib/tabulator.min.css}" />
    <style>
      .btn-back {
        background: none;
        border: 1px solid #dee2e6;
        color: #6c757d;
        transition: all 0.2s;
      }
      .btn-back:hover {
        background-color: #f1f3f5;
        color: #343a40;
      }
    </style>
  </head>
  <div layout:fragment="header-title">
    <span th:text="#{smart_system.rule.title}">Rule Management</span>
  </div>

  <div layout:fragment="content">
    <div class="container-fluid">
      <!-- ═══ Header Info Card ═══ -->
      <div class="card shadow-sm border-0 mb-4 rounded-4">
        <div class="card-header bg-white border-0 pt-3 pb-0">
          <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
              <h4 class="mb-0 font-weight-bold text-dark" th:text="${rule.name}">Rule Name</h4>
              <span class="badge ms-3" th:classappend="${rule.isActive ? 'bg-success' : 'bg-secondary'}" th:text="${rule.isActive ? #messages.msg('common.active') : #messages.msg('common.inactive')}">Active</span>
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-success btn-sm rounded-pill px-4 shadow-sm d-none" id="btnSaveAll" disabled>
                <i data-lucide="save" class="lucide-sm me-1"></i>
                <span th:text="#{common.save_changes}">Save Changes</span>
              </button>
              <a th:href="@{/management/smart-system/rules}" class="btn btn-sm btn-back px-3 rounded-pill">
                <i data-lucide="arrow-left" class="lucide-sm me-1"></i>
                <span th:text="#{error.back}">Back</span>
              </a>
            </div>
          </div>
        </div>
        <div class="card-body pt-2 pb-3">
          <div class="d-flex gap-4 text-muted small">
            <div>
              <span class="fw-bold me-1">ID:</span>
              <span th:text="'#' + ${rule.id}">#0</span>
              <input type="hidden" id="ruleId" th:value="${rule.id}" />
            </div>
          </div>
        </div>
      </div>

      <!-- ═══ Alerts Table Card ═══ -->
      <div class="card rounded-4 border-0 shadow-sm transition-all hover-shadow mb-4">
        <div class="card-header bg-white border-0 py-3 d-flex align-items-center">
          <h6 class="fw-bold m-0 me-auto d-flex align-items-center">
            <i data-lucide="bell" class="text-warning me-2 lucide-sm"></i>
            <span th:text="#{smart_system.alert.rule_title(${rule.name})}">Alert Configuration</span>
          </h6>
          <div class="d-flex gap-2">
            <button class="btn btn-primary btn-sm rounded-pill px-3" id="btnAddAlertConfig">
              <i data-lucide="plus" class="lucide-sm me-1"></i>
              <span th:text="#{common.add}">Add</span>
            </button>
            <button class="btn btn-danger btn-sm rounded-pill px-3" id="btnDeleteSelected" disabled>
              <i data-lucide="trash-2" class="lucide-sm me-1"></i>
              <span th:text="#{common.delete}">Delete</span>
            </button>
          </div>
        </div>
        <div class="card-body p-0">
          <div id="alertsTable"></div>
        </div>
      </div>
    </div>

    <!-- Alert Modal Form -->
    <div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 shadow-lg rounded-4">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold d-flex align-items-center">
              <i data-lucide="bell" class="text-warning me-2 lucide-md"></i>
              <span id="alertModalTitle">Add Alert Configuration</span>
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="alertForm" novalidate>
            <div class="modal-body py-4">
              <input type="hidden" id="alertLocalId" />
              <input type="hidden" id="alertConfigId" />
              <div class="row g-3">
                <!-- Alert Name -->
                <div class="col-12">
                  <label for="alertName" class="form-label fw-semibold small text-muted text-uppercase mb-1" th:text="#{smart_system.alert.field.alert_name}">Alert Name</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light border-0"><i data-lucide="tag" class="lucide-sm"></i></span>
                    <input type="text" class="form-control bg-light border-0" id="alertName" name="alertName" th:placeholder="#{smart_system.alert.placeholder.name}" required />
                  </div>
                  <div class="invalid-feedback" id="val-alertName"></div>
                </div>

                <!-- Severity & Cooldown -->
                <div class="col-md-6">
                  <label for="alertSeverity" class="form-label fw-semibold small text-muted text-uppercase mb-1" th:text="#{smart_system.alert.field.severity}">Severity</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light border-0"><i data-lucide="alert-triangle" class="lucide-sm"></i></span>
                    <select class="form-select bg-light border-0" id="alertSeverity" name="severity" required>
                      <option value="INFO">INFO</option>
                      <option value="WARNING">WARNING</option>
                      <option value="CRITICAL">CRITICAL</option>
                    </select>
                  </div>
                  <div class="invalid-feedback" id="val-severity"></div>
                </div>

                <div class="col-md-6">
                  <label for="alertCooldownMinutes" class="form-label fw-semibold small text-muted text-uppercase mb-1" th:text="#{smart_system.alert.field.cooldown_minutes}">Cooldown (Minutes)</label>
                  <div class="input-group">
                    <span class="input-group-text bg-light border-0"><i data-lucide="clock" class="lucide-sm"></i></span>
                    <input type="number" class="form-control bg-light border-0" id="alertCooldownMinutes" name="cooldownMinutes" min="0" placeholder="10" required />
                  </div>
                  <div class="invalid-feedback" id="val-cooldownMinutes"></div>
                </div>

                <!-- Recipient Groups -->
                <div class="col-12">
                  <label class="form-label fw-semibold small text-muted text-uppercase mb-1" th:text="#{smart_system.alert.field.recipient_groups}">Recipient Groups</label>
                  <div id="alertRecipientGroupsContainer" class="border border-0 bg-light rounded-3 p-3" style="max-height: 150px; overflow-y: auto;">
                    <p class="text-muted small mb-0" th:text="#{smart_system.alert.loading_groups}">Loading recipient groups...</p>
                  </div>
                  <div class="invalid-feedback d-block" id="val-recipientGroups"></div>
                </div>

                <!-- Channels & Options -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold small text-muted text-uppercase mb-1" th:text="#{smart_system.alert.field.channels}">Notification Channels</label>
                  <div class="d-flex flex-column gap-2 mt-1">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" name="channels" value="PUSH" id="channelPush" />
                      <label class="form-check-label text-dark" for="channelPush" th:text="#{smart_system.alert.channel.push}">Push Notification</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" name="channels" value="EMAIL" id="channelEmail" />
                      <label class="form-check-label text-dark" for="channelEmail" th:text="#{smart_system.alert.channel.email}">Email</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" name="channels" value="SMS" id="channelSms" />
                      <label class="form-check-label text-dark" for="channelSms" th:text="#{smart_system.alert.channel.sms}">SMS</label>
                    </div>
                  </div>
                  <div class="invalid-feedback d-block" id="val-channels"></div>
                </div>

                <div class="col-md-6 d-flex flex-column justify-content-center">
                  <label class="form-label fw-semibold small text-muted text-uppercase mb-2" th:text="#{smart_system.alert.field.auto_resolve}">Auto Resolve</label>
                  <div class="form-check form-switch switch-ios">
                    <input class="form-check-input" type="checkbox" role="switch" id="alertAutoResolve" name="autoResolve" />
                    <label class="form-check-label fw-medium text-dark" for="alertAutoResolve" th:text="#{smart_system.alert.field.auto_resolve_label}">Auto-Resolve Alert</label>
                  </div>
                </div>

                <!-- Message Template -->
                <div class="col-12">
                  <label for="alertMessageTemplate" class="form-label fw-semibold small text-muted text-uppercase mb-1" th:text="#{smart_system.alert.field.message_template}">Message Template</label>
                  <textarea class="form-control bg-light border-0" id="alertMessageTemplate" name="messageTemplate" rows="4" th:placeholder="#{smart_system.alert.placeholder.template}" required></textarea>
                  <div class="invalid-feedback" id="val-messageTemplate"></div>
                </div>
              </div>
            </div>
            <div class="modal-footer border-0 pt-0">
              <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal" th:text="#{logout.cancel.button}">Cancel</button>
              <button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm" id="btnSubmitAlert">
                <i data-lucide="check" class="lucide-sm me-1"></i>
                <span th:text="#{index.scene.trigger.confirm}">Confirm</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <th:block layout:fragment="scripts">
    <script th:inline="javascript">
      window.__ALERT_PAGE_CONFIG__ = {
        ruleName: /*[[${rule.name}]]*/ 'Rule',
        i18n: {
          saveSuccess: /*[[#{smart_system.alert.save_success}]]*/ 'Alert configurations saved successfully.',
          deleteSuccess: /*[[#{smart_system.alert.delete_success}]]*/ 'Alert configuration deleted.',
          confirmDelete: /*[[#{smart_system.alert.delete_confirm}]]*/ 'Are you sure you want to delete this configuration?',
          yesDelete: /*[[#{common.yes_delete}]]*/ 'Yes, delete',
          cancel: /*[[#{logout.cancel.button}]]*/ 'Cancel',
          success: /*[[#{common.success}]]*/ 'Success',
          error: /*[[#{common.error.title}]]*/ 'Error',
          noData: /*[[#{smart_system.alert.no_data}]]*/ 'No alert configurations found.',
          colAlertName: /*[[#{smart_system.alert.col.alert_name}]]*/ 'Alert Name',
          colSeverity: /*[[#{smart_system.alert.col.severity}]]*/ 'Severity',
          colCooldown: /*[[#{smart_system.alert.col.cooldown}]]*/ 'Cooldown',
          colRecipientGroups: /*[[#{smart_system.alert.col.recipient_groups}]]*/ 'Recipient Groups',
          colChannels: /*[[#{smart_system.alert.col.channels}]]*/ 'Channels',
          colAutoResolve: /*[[#{smart_system.alert.col.auto_resolve}]]*/ 'Auto Resolve',
          colActions: /*[[#{smart_system.alert.col.actions}]]*/ 'Actions',
          addTitle: /*[[#{smart_system.alert.modal.add_title}]]*/ 'Add Alert Config',
          editTitle: /*[[#{smart_system.alert.modal.edit_title}]]*/ 'Edit Alert Config',
          errLoadGroups: /*[[#{smart_system.alert.err_load_groups}]]*/ 'Failed to load recipient groups.',
          noGroups: /*[[#{smart_system.alert.no_groups}]]*/ 'No groups available.',
          valSelectGroup: /*[[#{smart_system.alert.val_select_group}]]*/ 'Please select at least one recipient group.',
          valSelectChannel: /*[[#{smart_system.alert.val_select_channel}]]*/ 'Please select at least one notification channel.',
          errLoadData: /*[[#{smart_system.alert.err_load_data}]]*/ 'Failed to load alert configurations.',
          deleteConfirmText: /*[[#{smart_system.alert.delete_confirm_text}]]*/ 'Are you sure you want to delete this alert config?',
          noChanges: /*[[#{smart_system.alert.no_changes}]]*/ 'No changes to save.',
          saving: /*[[#{smart_system.alert.saving}]]*/ 'Saving...',
          yes: /*[[#{common.yes}]]*/ 'Yes',
          no: /*[[#{common.no}]]*/ 'No',
          confirmDeleteBatch: /*[[#{common.confirm.delete_batch}]]*/ 'Delete {0} items?',
          confirmDeleteSingle: /*[[#{common.confirm.delete_single}]]*/ 'Delete {0} item?',
          info: /*[[#{common.info}]]*/ 'Info',
          colCooldownUnit: /*[[#{smart_system.alert.col.cooldown_unit}]]*/ 'mins',
          edit: /*[[#{common.edit}]]*/ 'Edit',
          delete: /*[[#{common.delete}]]*/ 'Delete'
        }
      };
    </script>
    <script type="module" th:src="@{/js/pages/smart_system/rule/alert/index.js}"></script>
  </th:block>
</html>
