<!doctype html>
<html
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.thymeleaf.org"
  layout:decorate="~{main_layout.html}"
>
  <head>
    <title th:text="#{rule.conditions.title}">Condition Management</title>
    <th:block th:replace="~{fragments/management.html :: css_resources}"></th:block>
    <style>
      .order-input {
        width: 60px;
        text-align: center;
      }
      .dirty-indicator {
        display: none;
      }
      .dirty-indicator.visible {
        display: inline;
      }
    </style>
  </head>
  <body>
    <th:block layout:fragment="header">
      <th:block
        th:replace="~{fragments/management.html :: page_header(#{rule.conditions.header})}"
      ></th:block>
    </th:block>

    <section class="content" layout:fragment="content">
      <div class="container-fluid">
        <!-- Rule Info Card (readonly) -->
        <div class="card card-outline card-primary shadow-sm border-0 mb-3">
          <div class="card-header border-0 pb-0">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
              <h3 class="card-title font-weight-bold text-dark mb-1">
                <i class="fas fa-code-branch mr-2 text-primary"></i>
                <span th:text="${rule.name}">Rule Name</span>
                <span
                  class="badge badge-pill ml-2"
                  th:classappend="${rule.isActive} ? 'badge-success' : 'badge-secondary'"
                  th:text="${rule.isActive} ? #{common.status.active} : #{common.status.inactive}"
                  >Status</span
                >
              </h3>
              <div class="card-tools">
                <a th:href="@{/rule/rules}" class="btn btn-default btn-sm mr-2">
                  <i class="fas fa-arrow-left mr-1"></i>
                  <span th:text="#{rule.conditions.btn.back}">Back</span>
                </a>
                <button
                  type="button"
                  class="btn btn-primary btn-sm font-weight-bold shadow-sm"
                  id="btnAddCondition"
                >
                  <i class="fas fa-plus mr-1"></i>
                  <span th:text="#{rule.conditions.btn.add}">Add Condition</span>
                </button>
              </div>
            </div>
            <!-- Readonly rule meta -->
            <div class="d-flex flex-wrap mt-1 mb-2 small text-muted">
              <span class="mr-3">
                <i class="fas fa-sort-amount-up mr-1"></i>
                <span th:text="#{rule.conditions.info.priority}">Priority:</span>
                <strong th:text="${rule.priority}">0</strong>
              </span>
              <span class="mr-3">
                <i class="fas fa-door-open mr-1"></i>
                <span th:text="#{rule.conditions.info.room}">Room ID:</span>
                <strong th:text="${rule.roomId}">-</strong>
              </span>
              <span class="mr-3">
                <i class="fas fa-microchip mr-1"></i>
                <span th:text="#{rule.conditions.info.device}">Target Device:</span>
                <strong th:text="${rule.targetDeviceId}">-</strong>
              </span>
              <span>
                <i class="fas fa-tag mr-1"></i>
                <span th:text="#{rule.conditions.info.category}">Category:</span>
                <strong th:text="${rule.targetDeviceCategory}">-</strong>
              </span>
            </div>
          </div>
        </div>

        <!-- Conditions Table Card -->
        <div class="card card-outline card-success shadow-sm border-0">
          <div class="card-header border-0 pb-0">
            <div class="d-flex justify-content-between align-items-center">
              <h3 class="card-title font-weight-bold text-dark">
                <i class="fas fa-filter mr-2 text-success"></i>
                <span th:text="#{rule.conditions.header}">Conditions</span>
                <span class="badge badge-warning ml-2 dirty-indicator" id="dirtyBadge">
                  <i class="fas fa-exclamation-triangle mr-1"></i>
                  <span th:text="#{rule.conditions.unsaved}">Unsaved changes</span>
                </span>
              </h3>
              <div class="card-tools">
                <button
                  type="button"
                  class="btn btn-success btn-sm font-weight-bold shadow-sm"
                  id="btnSaveConditions"
                >
                  <i class="fas fa-save mr-1"></i>
                  <span th:text="#{rule.conditions.btn.save}">Save All Changes</span>
                </button>
              </div>
            </div>
          </div>

          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover table-borderless text-nowrap w-100 mb-0">
                <thead class="bg-light text-muted small text-uppercase">
                  <tr>
                    <th style="width: 50px" th:text="#{rule.conditions.table.order}">#</th>
                    <th th:text="#{rule.conditions.table.datasource}">Data Source</th>
                    <th th:text="#{rule.conditions.table.resource}">Resource</th>
                    <th th:text="#{rule.conditions.table.operator}">Operator</th>
                    <th th:text="#{rule.conditions.table.value}">Value</th>
                    <th th:text="#{rule.conditions.table.next.logic}">Next Logic</th>
                    <th class="text-right" th:text="#{rule.conditions.table.actions}">Actions</th>
                  </tr>
                </thead>
                <tbody id="conditionsTableBody">
                  <!-- Populated by JS from server-side data -->
                </tbody>
              </table>
            </div>

            <!-- Empty state -->
            <div
              id="conditionsEmptyState"
              class="text-center py-5 text-muted"
              style="display: none"
            >
              <i class="fas fa-filter fa-3x mb-3 d-block text-light"></i>
              <p th:text="#{rule.conditions.table.empty}">
                No conditions yet. Add the first condition!
              </p>
              <button
                type="button"
                class="btn btn-outline-success btn-sm"
                id="btnAddConditionEmpty"
              >
                <i class="fas fa-plus mr-1"></i>
                <span th:text="#{rule.conditions.btn.add}">Add Condition</span>
              </button>
            </div>
          </div>
        </div>

        <!-- Condition Modal Fragment -->
        <th:block th:replace="~{fragments/rule/condition_modal.html :: modal_content}"></th:block>
      </div>
    </section>

    <th:block layout:fragment="optional">
      <script defer th:src="@{/scripts/common/const.js}"></script>
      <script defer th:src="@{/scripts/service/api/v1/rule_api_v1.js}"></script>
      <script defer th:src="@{/scripts/service/api/v1/floor_api_v1.js}"></script>
      <script defer th:src="@{/scripts/service/api/v1/room_api_v1.js}"></script>
      <script defer th:src="@{/scripts/service/api/v1/device_metadata_api_v1.js}"></script>
      <script defer th:src="@{/scripts/pages/rule/conditions.js}"></script>

      <script defer th:inline="javascript">
        /*<![CDATA[*/
        $(document).ready(function () {
          var ruleData = /*[[${rule}]]*/ {};
          ConditionManager.init(ruleData);
        });
        /*]]>*/
      </script>
    </th:block>
  </body>
</html>
