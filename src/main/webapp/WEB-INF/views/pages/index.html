<!doctype html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout.html}">
	<head>
		<title th:text="#{index.title}">Dashboard</title>
		<link rel="stylesheet" th:href="@{/css/pages/dashboard.css}" />
	</head>
	<body class="dashboard-page">
		<div layout:fragment="header-title">
			<span th:text="#{index.title}">Dashboard</span>
		</div>

		<div layout:fragment="content">
			<!-- Summary Metrics Row -->
			<div id="summary-container" class="row mb-4">
				<!-- Dynamically Rendered via index.js -->
			</div>

			<div class="row">
				<div class="col-12">
					<!-- Smart Scenes Row -->
					<div class="card shadow-sm border-0 mb-4 rounded-4">
						<div class="card-body p-3">
							<div id="scenes-container" class="d-flex flex-wrap gap-3">
								<!-- Dynamically Rendered via index.js -->
							</div>
						</div>
					</div>

					<!-- Floors & Rooms -->
					<div id="floors-container"></div>
				</div>
			</div>
		</div>

		<th:block layout:fragment="scripts">
			<script th:src="@{/js/pages/index.js}"></script>
			<script th:inline="javascript">
				document.addEventListener('DOMContentLoaded', () => {
					const floors = /*[[${floors}]]*/ [];
					const floorRoomMap = /*[[${floorRoomMap}]]*/ {};
					const roomInfoMap = /*[[${roomInfoMap}]]*/ {};
					const totalFloors = /*[[${totalFloors}]]*/ 0;
					const totalRooms = /*[[${totalRooms}]]*/ 0;
					const totalHardwares = /*[[${totalHardwares}]]*/ 0;

					const dashboardConfig = {
						floors,
						floorRoomMap,
						roomInfoMap,
						totalFloors,
						totalRooms,
						totalHardwares,
					};

					const dashboard = Dashboard(dashboardConfig);
					dashboard.init();
				});
			</script>
		</th:block>
	</body>
</html>
