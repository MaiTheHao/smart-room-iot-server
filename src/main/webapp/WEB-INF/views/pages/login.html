<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="#{login.title} + ' | ' + #{app.name}">Đăng nhập | IUH Smart Home</title>

    <!-- Local Fonts & Global Styles -->
    <link rel="stylesheet" th:href="@{/css/fonts.css}" />
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <!-- AdminLTE 4 -->
    <link rel="stylesheet" th:href="@{/css/lib/adminlte.min.css}" />
  </head>
  <body class="login-page bg-body-secondary">
    <!-- Login Error Alert -->
    <div
      th:if="${errorMessage != null and !errorMessage.isEmpty()}"
      class="position-fixed top-0 end-0 m-3 alert alert-danger alert-dismissible fade show shadow-sm"
      role="alert"
      style="z-index: 1060"
    >
      <div class="d-flex align-items-center">
        <i data-lucide="alert-circle" class="me-2"></i>
        <div>
          <strong class="d-block" th:text="#{login.error.title}">Lỗi đăng nhập</strong>
          <span th:text="${errorMessage}">Thông tin đăng nhập không hợp lệ</span>
        </div>
      </div>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="login-box">
      <div class="login-logo mb-4">
        <a href="/" class="link-dark text-center text-decoration-none">
          <h2 class="fw-bold mb-0">
            <span class="text-primary">IUH</span> <span th:text="#{app.name}">Smart Home</span>
          </h2>
        </a>
      </div>
      <!-- /.login-logo -->
      <div class="card card-outline card-primary shadow-lg border-0">
        <div class="card-body login-card-body p-4">
          <p class="login-box-msg text-muted mb-4" th:text="#{login.msg}">
            Đăng nhập để bắt đầu phiên làm việc
          </p>

          <form th:action="@{/loginAction}" method="post">
            <div class="input-group mb-3">
              <div class="form-floating flex-grow-1">
                <input
                  type="text"
                  id="username"
                  name="username"
                  class="form-control"
                  th:placeholder="#{login.username}"
                  required
                  autocomplete="username"
                />
                <label for="username" th:text="#{login.username}">Tên đăng nhập</label>
              </div>
              <div class="input-group-text bg-body-tertiary border-start-0">
                <i data-lucide="user"></i>
              </div>
            </div>

            <div class="input-group mb-3">
              <div class="form-floating flex-grow-1">
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-control"
                  th:placeholder="#{login.password}"
                  required
                  autocomplete="current-password"
                />
                <label for="password" th:text="#{login.password}">Mật khẩu</label>
              </div>
              <div class="input-group-text bg-body-tertiary border-start-0">
                <i data-lucide="lock"></i>
              </div>
            </div>

            <!-- begin::Row -->
            <div class="row align-items-center">
              <div class="col-7">
                <div class="form-check mb-0">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="remember"
                    name="remember-me"
                  />
                  <label
                    class="form-check-label text-muted"
                    for="remember"
                    th:text="#{login.remember_me}"
                  >
                    Ghi nhớ tôi
                  </label>
                </div>
              </div>
              <!-- /.col -->
              <div class="col-5">
                <div class="d-grid gap-2">
                  <button
                    type="submit"
                    class="btn btn-primary fw-semibold py-2"
                    th:text="#{login.button}"
                  >
                    Đăng nhập
                  </button>
                </div>
              </div>
              <!-- /.col -->
            </div>
            <!-- end::Row -->
          </form>
        </div>
        <!-- /.login-card-body -->
      </div>
    </div>
    <!-- /.login-box -->

    <!-- Required Scripts -->
    <script th:src="@{/js/lib/popper.min.js}"></script>
    <script th:src="@{/js/lib/bootstrap.min.js}"></script>
    <script th:src="@{/js/lib/lucide.min.js}"></script>
    <script th:src="@{/js/lib/adminlte.min.js}"></script>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        if (typeof lucide !== 'undefined') {
          lucide.createIcons();
        }
      });
    </script>
  </body>
</html>
