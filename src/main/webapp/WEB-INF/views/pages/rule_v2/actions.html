<!doctype html>
<html
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.thymeleaf.org"
  layout:decorate="~{main_layout.html}"
>
  <head>
    <title>Action Management V2</title>
    <th:block th:replace="~{fragments/management.html :: css_resources}"></th:block>
    <style>
      .order-input {
        width: 60px;
        text-align: center;
      }
      .dirty-indicator {
        display: none;
      }
      .dirty-indicator.visible {
        display: inline;
      }
    </style>
  </head>
  <body>
    <th:block layout:fragment="header">
      <th:block
        th:replace="~{fragments/management.html :: page_header('Action Management V2')}"
      ></th:block>
    </th:block>

    <section class="content" layout:fragment="content">
      <div class="container-fluid">
        <!-- Rule Info Card (readonly) -->
        <div class="card card-outline card-primary shadow-sm border-0 mb-3">
          <div class="card-header border-0 pb-0">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
              <h3 class="card-title font-weight-bold text-dark mb-1">
                <i class="fas fa-code-branch mr-2 text-primary"></i>
                <span id="headerRuleName">Loading...</span>
                <span id="headerRuleStatus" class="badge badge-pill ml-2">...</span>
              </h3>
              <div class="card-tools">
                <a th:href="@{/view/v2/rules}" class="btn btn-default btn-sm mr-2">
                  <i class="fas fa-arrow-left mr-1"></i>
                  <span>Back to Rules V2</span>
                </a>
                <button
                  type="button"
                  class="btn btn-primary btn-sm font-weight-bold shadow-sm"
                  id="btnAddAction"
                  disabled
                >
                  <i class="fas fa-plus mr-1"></i>
                  <span>Add Action</span>
                </button>
              </div>
            </div>
            <!-- Readonly rule meta -->
            <div class="d-flex flex-wrap mt-1 mb-2 small text-muted">
              <span class="mr-3">
                <i class="fas fa-sort-amount-up mr-1"></i>
                <span>Priority:</span>
                <strong id="headerRulePriority">-</strong>
              </span>
              <span>
                <i class="fas fa-stopwatch mr-1"></i>
                <span>Interval (s):</span>
                <strong id="headerRuleInterval" class="text-danger">-</strong>
              </span>
            </div>
          </div>
        </div>

        <!-- Actions Table Card -->
        <div class="card card-outline card-warning shadow-sm border-0">
          <div class="card-header border-0 pb-0">
            <div class="d-flex justify-content-between align-items-center">
              <h3 class="card-title font-weight-bold text-dark">
                <i class="fas fa-bolt mr-2 text-warning"></i>
                <span>Actions List</span>
                <span class="badge badge-warning ml-2 dirty-indicator" id="dirtyBadge">
                  <i class="fas fa-exclamation-triangle mr-1"></i>
                  <span>Unsaved changes</span>
                </span>
              </h3>
              <div class="card-tools">
                <button
                  type="button"
                  class="btn btn-warning btn-sm font-weight-bold shadow-sm"
                  id="btnSaveActions"
                  disabled
                >
                  <i class="fas fa-save mr-1"></i>
                  <span>Save All Changes</span>
                </button>
              </div>
            </div>
          </div>

          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover table-borderless text-nowrap w-100 mb-0">
                <thead class="bg-light text-muted small text-uppercase">
                  <tr>
                    <th style="width: 50px">Order</th>
                    <th>Device</th>
                    <th>Category</th>
                    <th>Parameters</th>
                    <th class="text-right">Actions</th>
                  </tr>
                </thead>
                <tbody id="actionsTableBody">
                  <!-- Populated by JS -->
                </tbody>
              </table>
            </div>

            <!-- Empty state -->
            <div id="actionsEmptyState" class="text-center py-5 text-muted" style="display: none">
              <i class="fas fa-bolt fa-3x mb-3 d-block text-warning opacity-50"></i>
              <p>No actions yet. Add the first action!</p>
              <button type="button" class="btn btn-outline-warning btn-sm" id="btnAddActionEmpty">
                <i class="fas fa-plus mr-1"></i>
                <span>Add Action</span>
              </button>
            </div>
          </div>
        </div>

        <!-- Action Modal Fragment -->
        <th:block th:replace="~{fragments/rule_v2/action_modal.html :: modal_content}"></th:block>

        <template id="actionRowTemplate">
          <tr data-local-id="{localId}">
            <td class="align-middle" style="width: 80px">
              <input
                type="number"
                class="form-control form-control-sm order-input text-center"
                value="{executionOrder}"
                min="0"
                data-local-id="{localId}"
              />
            </td>
            <td class="align-middle font-weight-bold text-dark">#{targetDeviceId}</td>
            <td class="align-middle">{categoryDisplay}</td>
            <td class="align-middle small text-break" style="max-width: 300px; white-space: normal">
              {paramsDisplay}
            </td>
            <td class="align-middle text-right">
              <button
                class="btn btn-sm btn-default btn-edit-act"
                data-local-id="{localId}"
                title="Edit"
              >
                <i class="fas fa-pen text-primary"></i>
              </button>
              <button
                class="btn btn-sm btn-default btn-delete-act"
                data-local-id="{localId}"
                title="Delete"
              >
                <i class="fas fa-trash text-danger"></i>
              </button>
            </td>
          </tr>
        </template>
      </div>
    </section>

    <th:block layout:fragment="optional">
      <script defer th:src="@{/scripts/service/api/v2/rule_api_v2.js}"></script>
      <script defer th:src="@{/scripts/service/api/v1/floor_api_v1.js}"></script>
      <script defer th:src="@{/scripts/service/api/v1/room_api_v1.js}"></script>
      <script defer th:src="@{/scripts/service/api/v1/device_metadata_api_v1.js}"></script>
      <script defer th:src="@{/scripts/pages/rule/rule_common.js}"></script>
      <script defer th:src="@{/scripts/pages/rule_v2/actions.js}"></script>

      <script defer th:inline="javascript">
        /*<![CDATA[*/
        $(document).ready(function () {
          var ruleId = /*[[${ruleId}]]*/ null;
          ActionV2Manager.init(ruleId);
        });
        /*]]>*/
      </script>
    </th:block>
  </body>
</html>
