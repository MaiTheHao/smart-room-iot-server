<!doctype html>
<html
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.thymeleaf.org"
  layout:decorate="~{main_layout.html}"
>
  <head>
    <title>Action Management</title>
    <th:block th:replace="~{fragments/management.html :: css_resources}"></th:block>
    <style>
      .order-input {
        width: 50px;
        text-align: center;
        border-radius: 4px;
      }
      .dirty-indicator {
        display: none;
      }
      .dirty-indicator.visible {
        display: inline;
      }
      .meta-list {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0;
        color: #6c757d;
        font-size: 0.95rem;
      }
      .meta-item:not(:last-child)::after {
        content: '|';
        margin: 0 15px;
        color: #dee2e6;
        font-weight: 300;
      }
      .meta-label {
        font-weight: 600;
        color: #495057;
        margin-right: 5px;
      }
      .btn-back {
        background: none;
        border: 1px solid #dee2e6;
        color: #6c757d;
        transition: all 0.2s;
      }
      .btn-back:hover {
        background-color: #f1f3f5;
        color: #343a40;
      }
    </style>
  </head>
  <body>
    <th:block layout:fragment="header">
      <th:block
        th:replace="~{fragments/management.html :: page_header('Action Management')}"
      ></th:block>
    </th:block>

    <section class="content" layout:fragment="content">
      <div class="container-fluid">
        <!-- Section 1: Minimal Rule Metadata Card -->
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white border-0 pt-3 pb-0">
            <div class="d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center">
                <h4 class="mb-0 font-weight-bold text-dark" id="headerRuleName">Loading...</h4>
                <span id="headerRuleStatus" class="ml-3 text-secondary small"><i class="fas fa-circle mr-1" style="font-size: 8px"></i> ...</span>
              </div>
              <a th:href="@{/view/v2/rules}" class="btn btn-sm btn-back px-3">
                <i class="fas fa-chevron-left mr-1 small"></i>
                <span th:text="#{rulev2.action.btn.back}">Back to Rules</span>
              </a>
            </div>
          </div>
          <div class="card-body pt-2 pb-3">
            <div class="meta-list">
              <div class="meta-item">
                <span class="meta-label">ID:</span>
                <span>#<span th:text="${ruleId}">0</span></span>
              </div>
              <div class="meta-item">
                <span class="meta-label" th:text="#{rulev2.action.label.priority}">Priority:</span>
                <span id="headerRulePriority">0</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">Room:</span>
                <span id="headerRuleRoom">-</span>
              </div>
              <div class="meta-item">
                <span class="meta-label" th:text="#{rulev2.action.label.interval}">Interval (s):</span>
                <span id="headerRuleInterval">60s</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Section 2: Actions Datatable Card -->
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white border-bottom-0 pt-4">
            <div class="d-flex justify-content-between align-items-center">
              <h5 class="m-0 font-weight-bold text-dark">
                <i class="fas fa-bolt mr-2 text-primary opacity-75"></i>
                <span th:text="#{rulev2.action.list.title}">Actions List</span>
              </h5>
              <div class="card-tools d-flex align-items-center">
                <div id="unsavedStatus" class="mr-3" style="display: none">
                  <span class="text-warning small font-weight-bold">
                    <i class="fas fa-sync-alt fa-spin mr-1"></i>
                    <span th:text="#{rulev2.action.unsaved}">Unsaved changes</span>
                  </span>
                </div>
                <button
                  type="button"
                  class="btn btn-primary btn-sm px-3 font-weight-bold shadow-sm"
                  id="btnAddAction"
                >
                  <i class="fas fa-plus mr-1"></i>
                  <span th:text="#{rulev2.action.btn.add}">Add Action</span>
                </button>
              </div>
            </div>
          </div>

          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover table-sm mb-0" id="actionsTable">
                <thead class="bg-light text-muted small text-uppercase">
                  <tr>
                    <th class="pl-4 py-3" style="width: 80px" th:text="#{rulev2.action.table.order}">Order</th>
                    <th class="py-3" th:text="#{rulev2.action.table.device}">Device</th>
                    <th class="py-3" th:text="#{rulev2.action.table.category}">Category</th>
                    <th class="py-3" th:text="#{rulev2.action.table.params}">Parameters</th>
                    <th class="text-right pr-4 py-3" th:text="#{rulev2.action.table.actions}">Actions</th>
                  </tr>
                </thead>
                <tbody id="actionsList">
                  <!-- Dynamic -->
                </tbody>
              </table>
            </div>

            <div id="emptyActions" class="text-center py-5" style="display: none">
              <i class="fas fa-tasks fa-3x text-muted mb-3"></i>
              <p class="text-muted" th:text="#{rulev2.action.list.empty}">No actions yet!</p>
              <button
                type="button"
                class="btn btn-outline-primary btn-sm mt-2 font-weight-bold"
                id="btnAddActionEmpty"
              >
                <i class="fas fa-plus mr-1"></i>
                <span th:text="#{rulev2.action.btn.add}">Add Action</span>
              </button>
            </div>
          </div>

          <div class="card-footer bg-white border-top-0 text-right py-4 pr-4">
            <button
              type="button"
              class="btn btn-success px-5 font-weight-bold shadow-sm"
              id="btnSaveAllActions"
            >
              <i class="fas fa-check-circle mr-2"></i>
              <span th:text="#{rulev2.action.btn.save_all}">Save All Changes</span>
            </button>
          </div>
        </div>
        </div>

        <!-- Action Modal Fragment -->
        <th:block th:replace="~{fragments/rule_v2/action_modal.html :: modal_content}"></th:block>

        <template id="actionRowTemplate">
          <tr data-local-id="{localId}">
            <td class="align-middle pl-4">
              <input
                type="number"
                class="form-control form-control-sm order-input"
                value="{executionOrder}"
                min="0"
                data-local-id="{localId}"
              />
            </td>
            <td class="align-middle font-weight-bold text-dark">{targetDeviceId}</td>
            <td class="align-middle">{categoryDisplay}</td>
            <td class="align-middle">
              {paramsDisplay}
            </td>
            <td class="align-middle text-right pr-4">
              <button
                class="btn btn-sm btn-link text-primary p-1 btn-edit-act"
                data-local-id="{localId}"
                title="Edit"
              >
                <i class="fas fa-edit"></i>
              </button>
              <button
                class="btn btn-sm btn-link text-danger p-1 btn-delete-act"
                data-local-id="{localId}"
                title="Delete"
              >
                <i class="fas fa-trash-alt"></i>
              </button>
            </td>
          </tr>
        </template>
      </div>
    </section>

    <th:block layout:fragment="optional">
      <script defer th:src="@{/scripts/service/api/v2/rule_api_v2.js}"></script>
      <script defer th:src="@{/scripts/service/api/v1/floor_api_v1.js}"></script>
      <script defer th:src="@{/scripts/service/api/v1/room_api_v1.js}"></script>
      <script defer th:src="@{/scripts/service/api/v1/device_metadata_api_v1.js}"></script>
      <script defer th:src="@{/scripts/pages/rule/rule_common.js}"></script>
      <script defer th:src="@{/scripts/pages/rule_v2/actions.js}"></script>

      <script defer th:inline="javascript">
        /*<![CDATA[*/
        $(document).ready(function () {
          var ruleId = /*[[${ruleId}]]*/ null;
          ActionV2Manager.init(ruleId);
        });
        /*]]>*/
      </script>
    </th:block>
  </body>
</html>
