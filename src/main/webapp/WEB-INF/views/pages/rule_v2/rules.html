<!doctype html>
<html
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.thymeleaf.org"
  layout:decorate="~{main_layout.html}"
>
  <head>
    <title>Rule Management</title>
    <th:block th:replace="~{fragments/management.html :: css_resources}"></th:block>
  </head>
  <body>
    <th:block layout:fragment="header">
      <th:block
        th:replace="~{fragments/management.html :: page_header('Rule Management')}"
      ></th:block>
    </th:block>

    <section class="content" layout:fragment="content">
      <div class="container-fluid">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white border-bottom-0 pt-4">
            <div class="d-flex justify-content-between align-items-center">
              <h5 class="m-0 font-weight-bold text-dark">
                <i class="fas fa-list mr-2 text-primary opacity-75"></i>
                <span th:text="#{rulev2.list.title}">Rules List</span>
              </h5>
              <div class="card-tools d-flex align-items-center">
                <button
                  type="button"
                  class="btn btn-light btn-sm mr-2"
                  id="btnReloadRules"
                  th:title="#{rulev2.list.btn.reload}"
                >
                  <i class="fas fa-sync-alt mr-1"></i>
                  <span th:text="#{rulev2.list.btn.reload}">Reload Rules</span>
                </button>
                <button
                  type="button"
                  class="btn btn-primary btn-sm font-weight-bold shadow-sm"
                  id="btnCreateRule"
                >
                  <i class="fas fa-plus mr-1"></i>
                  <span th:text="#{rulev2.list.btn.add}">Add Rule</span>
                </button>
              </div>
            </div>
          </div>

          <div class="card-body p-0">
            <div class="table-responsive">
              <table id="rulesTable" class="table table-hover table-sm mb-0 text-nowrap w-100">
              <thead class="bg-light text-muted small text-uppercase">
                <tr>
                  <th th:text="#{rulev2.list.table.id}">ID</th>
                  <th th:text="#{rulev2.list.table.name}">Name</th>
                  <th th:text="#{rulev2.list.table.priority}">Priority</th>
                  <th th:text="#{rulev2.list.table.interval}">Interval (s)</th>
                  <th th:text="#{rulev2.list.table.status}">Status</th>
                  <th th:text="#{rulev2.list.table.conditions}">Conditions</th>
                  <th th:text="#{rulev2.list.table.actions}">Actions</th>
                  <th class="text-right" th:text="#{rulev2.list.table.manage}">Manage</th>
                </tr>
              </thead>
              <tbody>
                <!-- Populated by DataTable / JS -->
                  </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Rule V2 Modal Fragment -->
        <th:block th:replace="~{fragments/rule_v2/rule_modal.html :: modal_content}"></th:block>
      </div>
    </section>

    <th:block layout:fragment="optional">
      <script defer th:src="@{/webjars/datatables/js/jquery.dataTables.min.js}"></script>
      <script defer th:src="@{/webjars/datatables/js/dataTables.bootstrap4.min.js}"></script>

      <script defer th:src="@{/scripts/service/api/v2/rule_api_v2.js}"></script>
      <script defer th:src="@{/scripts/service/api/v1/floor_api_v1.js}"></script>
      <script defer th:src="@{/scripts/service/api/v1/room_api_v1.js}"></script>
      <script defer th:src="@{/scripts/pages/rule/rule_common.js}"></script>
      <script defer th:src="@{/scripts/pages/rule_v2/rules.js}"></script>

      <script defer th:inline="javascript">
        /*<![CDATA[*/
        $(document).ready(function () {
          RuleV2Manager.init();
        });
        /*]]>*/
      </script>
    </th:block>
  </body>
</html>
